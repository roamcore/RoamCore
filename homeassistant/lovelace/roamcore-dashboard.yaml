# RoamCore Dashboard - Lovelace configuration
# This is a custom dashboard using the RoamCore custom cards.
# Reference: homeassistant/www/roamcore/*.js

title: RoamCore
views:
  # Main dashboard (home)
  - path: home
    title: Dashboard
    icon: mdi:home
    panel: true
    cards:
      - type: custom:roamcore-dashboard-card

  # Power detail page
  - path: power
    title: Power
    icon: mdi:lightning-bolt
    panel: false
    cards:
      - type: vertical-stack
        cards:
          - type: custom:roamcore-victron-connect
            title: Victron (Connect)
          - type: custom:roamcore-power-page

  # Network detail page
  - path: network
    title: Network
    icon: mdi:wifi
    panel: true
    cards:
      - type: custom:roamcore-network-page

  # Location/Map page
  - path: location
    title: Location
    icon: mdi:map-marker
    panel: true
    cards:
      - type: custom:roamcore-location-page

  # Map page (embedded)
  - path: map
    title: Map
    icon: mdi:map
    panel: true
    cards:
      - type: custom:roamcore-map-page

  # Traccar page (full UI, proxied + auto-login)
  - path: traccar
    title: Traccar
    icon: mdi:map-clock
    panel: true
    cards:
      - type: iframe
        url: /api/roamcore/traccar/
        aspect_ratio: 75%

  # Level page
  - path: level
    title: Level
    icon: mdi:spirit-level
    panel: true
    cards:
      - type: custom:roamcore-level-page

  # Settings page
  - path: settings
    title: Settings
    icon: mdi:cog
    panel: true
    cards:
      - type: custom:roamcore-settings-page

  # Debug / health view (MVP observability)
  - path: status
    title: Status
    icon: mdi:heart-pulse
    panel: false
    cards:
      - type: entities
        title: Power backend (Victron)
        entities:
          - entity: binary_sensor.rc_system_power_backend_connected
          - entity: sensor.rc_system_power_backend_status
          - entity: sensor.rc_system_power_backend_snapshot_state
          - entity: sensor.rc_system_power_backend_devices
          - entity: sensor.rc_system_power_backend_topics
      - type: entities
        title: Vendor layer (vt_*)
        entities:
          - entity: binary_sensor.vt_victron_availability
          - entity: sensor.vt_victron_backend_status
          - entity: sensor.vt_victron_snapshot_state
          - entity: sensor.vt_victron_devices_count
          - entity: sensor.vt_victron_topics_count

      - type: entities
        title: Networking (rc_net_*)
        entities:
          - entity: sensor.rc_net_wan_status
          - entity: sensor.rc_net_wan_source
          - entity: sensor.rc_net_ping
          - entity: sensor.rc_net_download
          - entity: sensor.rc_net_upload
          - entity: sensor.rc_net_packet_loss
          - entity: sensor.rc_net_jitter
          - entity: sensor.rc_net_uptime
          - entity: sensor.rc_net_last_disconnect
