# RoamCore additions to configuration.yaml
# Add these to your existing configuration.yaml

# Enable RoamCore Home Assistant "packages" (YAML bundles under /config/packages)
# so `homeassistant/packages/*.yaml` in this repo can be dropped into HAOS.
homeassistant:
  packages: !include_dir_named packages

# Lovelace dashboard mode (YAML) and resources
lovelace:
  mode: storage
  resources:
    - url: /local/roamcore/roamcore-dashboard.js
      type: module
    - url: /local/roamcore/roamcore-tiles.js
      type: module
    - url: /local/roamcore/roamcore-pages.js
      type: module
  dashboards:
    roamcore:
      mode: yaml
      title: RoamCore
      icon: mdi:van-utility
      show_in_sidebar: true
      filename: lovelace/roamcore-dashboard.yaml
