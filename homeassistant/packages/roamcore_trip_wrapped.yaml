# RoamCore MVP: Trip Wrapped export wiring
#
# This package wires a dashboard button -> script -> shell_command that
# generates `/config/www/roamcore/trip_wrapped/latest.html`.

# Ensure the custom component reverse-proxy is loaded so we can embed Traccar
# without local-network iframe blocks and without requiring the user to log in.
roamcore_traccar_proxy:

input_text:
  rc_owner_name:
    name: "RC Owner Name"
    initial: "You"

  rc_traccar_base_url:
    name: "RC Traccar Base URL"
    initial: "http://localhost:8082"  # adjust for your Traccar add-on/external URL
  rc_traccar_username:
    name: "RC Traccar Username"
  rc_traccar_password:
    name: "RC Traccar Password"
    mode: password

  rc_traccar_ingress_path:
    name: "RC Traccar Ingress Path"
    # Example add-on ingress path: /hassio/ingress/a0d7b954_traccar/
    # NOTE: do NOT include a trailing slash; HA hassio handler can mis-parse it.
    initial: "/hassio/ingress/a0d7b954_traccar"

  rc_traccar_ui_url:
    name: "RC Traccar UI URL"
    # Use the same-origin HA reverse proxy so the UI can be embedded in HA mobile,
    # and auto-login can be handled server-side.
    initial: "/api/roamcore/traccar"

  rc_trip_wrapped_from:
    name: "RC Trip Wrapped From (ISO8601)"
    initial: "2026-03-01T00:00:00Z"
  rc_trip_wrapped_to:
    name: "RC Trip Wrapped To (ISO8601)"
    initial: "2026-03-08T00:00:00Z"

# Simple health check for the Traccar UI.
# This avoids adding more template sensors (packages don't merge template lists well).
binary_sensor:
  - platform: command_line
    name: "RC Traccar UI Reachable"
    unique_id: rc_traccar_ui_reachable
    command: >-
      sh -lc 'curl -fsS --max-time 5 "{{ states(''input_text.rc_traccar_ui_url'') }}" >/dev/null && echo ON || echo OFF'
    scan_interval: 30
    payload_on: "ON"
    payload_off: "OFF"

input_number:
  rc_traccar_device_id:
    name: "RC Traccar Device ID"
    min: 1
    max: 999999
    step: 1
    mode: box
    initial: 1

shell_command:
  rc_trip_wrapped_export: >-
    python3 /config/tools/trip_wrapped/export.py
    --base-url {{ states('input_text.rc_traccar_base_url') }}
    --username {{ states('input_text.rc_traccar_username') }}
    --password {{ states('input_text.rc_traccar_password') }}
    --device-id {{ states('input_number.rc_traccar_device_id') | int }}
    --from {{ states('input_text.rc_trip_wrapped_from') }}
    --to {{ states('input_text.rc_trip_wrapped_to') }}
    --title "Trip Wrapped"
    --owner-name "{{ states('input_text.rc_owner_name') if states('input_text.rc_owner_name') not in ['unknown','unavailable','none',''] else 'You' }}"
    --out-json /config/www/roamcore/trip_wrapped/latest.json
    --out-html /config/www/roamcore/trip_wrapped/latest.html

  # Automatic "Today" export for dashboard tiles.
  # Uses HA's current time (UTC by default in this deployment) and writes a stable JSON used by sensors.
  rc_trip_wrapped_export_today: >-
    python3 /config/tools/trip_wrapped/export.py
    --base-url {{ states('input_text.rc_traccar_base_url') }}
    --username {{ states('input_text.rc_traccar_username') }}
    --password {{ states('input_text.rc_traccar_password') }}
    --device-id {{ states('input_number.rc_traccar_device_id') | int }}
    --from {{ now().replace(hour=0, minute=0, second=0, microsecond=0).isoformat() }}
    --to {{ now().isoformat() }}
    --title "RoamCore Trip Wrapped (Today)"
    --out-json /config/www/roamcore/trip_wrapped/today.json
    --out-html /config/www/roamcore/trip_wrapped/today.html

script:
  rc_trip_wrapped_run:
    alias: "RC: Generate Trip Wrapped"
    mode: single
    sequence:
      - service: shell_command.rc_trip_wrapped_export
      - service: persistent_notification.create
        data:
          title: "Trip Wrapped ready"
          message: "Open: /local/roamcore/trip_wrapped/latest.html"

  rc_trip_wrapped_run_today:
    alias: "RC: Generate Trip Wrapped (Today)"
    mode: single
    sequence:
      - service: shell_command.rc_trip_wrapped_export_today

automation:
  - id: rc_trip_wrapped_auto_today
    alias: "RC: Auto-generate Trip Wrapped (Today)"
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/15"
    condition: []
    action:
      - service: script.rc_trip_wrapped_run_today

sensor:
  # Today summary sensors used by dashboard tiles.
  # These read the generated /local JSON so we don't recompute in the frontend.
  - platform: command_line
    name: "RC Trip Wrapped Today Distance"
    unique_id: rc_trip_wrapped_today_distance_mi
    unit_of_measurement: "mi"
    command: >-
      sh -lc 'python3 - <<"PY"
      import json,math
      p="/config/www/roamcore/trip_wrapped/today.json"
      try:
        o=json.load(open(p,"r"))
        m=float(o.get("stats",{}).get("totalDistanceM") or 0)
        mi=m/1609.344
        print(round(mi,2))
      except Exception:
        print("unknown")
      PY'
    scan_interval: 60

  - platform: command_line
    name: "RC Trip Wrapped Today Duration"
    unique_id: rc_trip_wrapped_today_duration_hms
    command: >-
      sh -lc 'python3 - <<"PY"
      import json
      p="/config/www/roamcore/trip_wrapped/today.json"
      try:
        o=json.load(open(p,"r"))
        s=int(o.get("stats",{}).get("totalDurationS") or 0)
        h=s//3600
        m=(s%3600)//60
        print(f"{h}:{m:02d}")
      except Exception:
        print("unknown")
      PY'
    scan_interval: 60

  - platform: command_line
    name: "RC Trip Wrapped Today Stops"
    unique_id: rc_trip_wrapped_today_stops
    command: >-
      sh -lc 'python3 - <<"PY"
      import json
      p="/config/www/roamcore/trip_wrapped/today.json"
      try:
        o=json.load(open(p,"r"))
        # MVP: use tripCount as a rough proxy for stops/segments until we compute real stop events.
        print(int((o.get("meta",{}).get("tripCount") or 0)))
      except Exception:
        print("unknown")
      PY'
    scan_interval: 60
