# RoamCore mapping: Victron vendor entities (vt_*) -> RoamCore contract (rc_*)
# Naming convention reference:
#   RoamCore/docs/reference/rc-entity-naming.md
#
# Strategy:
# - Mirror Victron vendor entities (vt_*) into RoamCore contract entities (rc_*).
# - Keep this layer thin so we can swap upstream data sources without changing UIs.

template:
  - sensor:
      - name: "RC Power Battery SoC"
        unique_id: rc_power_battery_soc
        unit_of_measurement: "%"
        state: >-
          {{ states('sensor.vt_battery_soc_percent') }}

      - name: "RC Power Battery Voltage"
        unique_id: rc_power_battery_voltage
        unit_of_measurement: "V"
        state: >-
          {{ states('sensor.vt_battery_voltage_v') }}

      - name: "RC Power Battery Current"
        unique_id: rc_power_battery_current
        unit_of_measurement: "A"
        state: >-
          {{ states('sensor.vt_battery_current_a') }}

      - name: "RC Power Solar Power"
        unique_id: rc_power_solar_power
        unit_of_measurement: "W"
        device_class: power
        state: >-
          {{ states('sensor.vt_solar_power_w') }}

      - name: "RC Power Load Power"
        unique_id: rc_power_load_power
        unit_of_measurement: "W"
        device_class: power
        state: >-
          {{ states('sensor.vt_dc_load_power_w') }}

      - name: "RC Power AC In Power"
        unique_id: rc_power_ac_in_power
        unit_of_measurement: "W"
        device_class: power
        state: >-
          {{ states('sensor.vt_ac_in_power_w') }}

      - name: "RC Power AC Out Power"
        unique_id: rc_power_ac_out_power
        unit_of_measurement: "W"
        device_class: power
        state: >-
          {{ states('sensor.vt_ac_out_power_w') }}

  - binary_sensor:
      - name: "RC Power Shore Connected"
        unique_id: rc_power_shore_connected
        state: >-
          {{ is_state('binary_sensor.vt_shore_connected', 'on') }}
