# RoamCore mapping: Victron vendor entities (vt_*) -> RoamCore contract (rc_*)
# Naming convention reference:
#   RoamCore/docs/reference/rc-entity-naming.md
#
# Strategy:
# - Prefer Victron vendor entities (vt_*) when available.
# - Fall back to existing dev mocks (input_* / template) when vt_* unavailable.

template:
  - sensor:
      - name: "RC Power Battery SoC"
        unique_id: rc_power_battery_soc
        unit_of_measurement: "%"
        state: >-
          {% set v = states('sensor.vt_power_battery_soc') %}
          {% if v not in ['unknown','unavailable','none',''] %}
            {{ v }}
          {% else %}
            {{ states('sensor.rc_power_battery_soc') }}
          {% endif %}

      - name: "RC Power Battery Voltage"
        unique_id: rc_power_battery_voltage
        unit_of_measurement: "V"
        state: >-
          {% set v = states('sensor.vt_power_battery_voltage') %}
          {% if v not in ['unknown','unavailable','none',''] %}
            {{ v }}
          {% else %}
            {{ states('sensor.rc_power_battery_voltage') }}
          {% endif %}

      - name: "RC Power Battery Current"
        unique_id: rc_power_battery_current
        unit_of_measurement: "A"
        state: >-
          {% set v = states('sensor.vt_power_battery_current') %}
          {% if v not in ['unknown','unavailable','none',''] %}
            {{ v }}
          {% else %}
            {{ states('sensor.rc_power_battery_current') }}
          {% endif %}

      - name: "RC Power Solar Power"
        unique_id: rc_power_solar_power
        unit_of_measurement: "W"
        device_class: power
        state: >-
          {% set v = states('sensor.vt_power_solar_power') %}
          {% if v not in ['unknown','unavailable','none',''] %}
            {{ v }}
          {% else %}
            {{ states('sensor.rc_power_solar_power') }}
          {% endif %}

      - name: "RC Power Load Power"
        unique_id: rc_power_load_power
        unit_of_measurement: "W"
        device_class: power
        state: >-
          {% set v = states('sensor.vt_power_load_power') %}
          {% if v not in ['unknown','unavailable','none',''] %}
            {{ v }}
          {% else %}
            {{ states('sensor.rc_power_load_power') }}
          {% endif %}

  - binary_sensor:
      - name: "RC Power Shore Connected"
        unique_id: rc_power_shore_connected
        state: >-
          {% set v = states('binary_sensor.vt_power_shore_connected') %}
          {% if v in ['on','off'] %}
            {{ true if v == 'on' else false }}
          {% else %}
            {{ is_state('binary_sensor.rc_power_shore_connected', 'on') }}
          {% endif %}
