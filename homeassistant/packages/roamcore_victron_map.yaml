# RoamCore mapping: Victron vendor entities (vt_*) -> RoamCore contract (rc_*)
# Naming convention reference:
#   RoamCore/docs/reference/rc-entity-naming.md
#
# Strategy:
# - Mirror Victron vendor entities (vt_*) into RoamCore contract entities (rc_*).
# - Keep this layer thin so we can swap upstream data sources without changing UIs.

template:
  - sensor:
      - name: "RC Power Battery SoC"
        unique_id: rc_power_battery_soc
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        icon: mdi:battery
        state: >-
          {{ states('sensor.vt_battery_soc_percent') | float(0) | round(1) }}
        availability: >-
          {{ states('sensor.vt_battery_soc_percent') not in ['unknown', 'unavailable'] }}

      - name: "RC Power Battery Voltage"
        unique_id: rc_power_battery_voltage
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        icon: mdi:car-battery
        state: >-
          {{ states('sensor.vt_battery_voltage_v') | float(0) | round(2) }}
        availability: >-
          {{ states('sensor.vt_battery_voltage_v') not in ['unknown', 'unavailable'] }}

      - name: "RC Power Battery Current"
        unique_id: rc_power_battery_current
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement
        icon: mdi:current-dc
        state: >-
          {{ states('sensor.vt_battery_current_a') | float(0) | round(2) }}
        availability: >-
          {{ states('sensor.vt_battery_current_a') not in ['unknown', 'unavailable'] }}

      - name: "RC Power Battery Power"
        unique_id: rc_power_battery_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-charging
        state: >-
          {{ states('sensor.vt_battery_power_w') | float(0) | round(0) }}
        availability: >-
          {{ states('sensor.vt_battery_power_w') not in ['unknown', 'unavailable'] }}

      - name: "RC Power Solar Power"
        unique_id: rc_power_solar_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:solar-power
        state: >-
          {{ states('sensor.vt_solar_power_w') | float(0) | round(0) }}
        availability: >-
          {{ states('sensor.vt_solar_power_w') not in ['unknown', 'unavailable'] }}

      - name: "RC Power Load Power"
        unique_id: rc_power_load_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:flash
        state: >-
          {{ states('sensor.vt_dc_load_power_w') | float(0) | round(0) }}
        availability: >-
          {{ states('sensor.vt_dc_load_power_w') not in ['unknown', 'unavailable'] }}

      - name: "RC Power AC In Power"
        unique_id: rc_power_ac_in_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:transmission-tower
        state: >-
          {{ states('sensor.vt_ac_in_power_w') | float(0) | round(0) }}
        availability: >-
          {{ states('sensor.vt_ac_in_power_w') not in ['unknown', 'unavailable'] }}

      - name: "RC Power AC Out Power"
        unique_id: rc_power_ac_out_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:power-plug
        state: >-
          {{ states('sensor.vt_ac_out_power_w') | float(0) | round(0) }}
        availability: >-
          {{ states('sensor.vt_ac_out_power_w') not in ['unknown', 'unavailable'] }}

  - binary_sensor:
      - name: "RC Power Shore Connected"
        unique_id: rc_power_shore_connected
        device_class: plug
        icon: mdi:power-plug
        state: >-
          {{ is_state('binary_sensor.vt_shore_connected', 'on') }}
        availability: >-
          {{ states('binary_sensor.vt_shore_connected') not in ['unknown', 'unavailable'] }}
