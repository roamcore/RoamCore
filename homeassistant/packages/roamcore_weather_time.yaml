# RoamCore contract entities: Weather + Time (MVP)
# Naming convention reference:
#   RoamCore/docs/reference/rc-entity-naming.md

# NOTE (MVP): We assume the built-in Open-Meteo integration provides a
# weather entity (commonly `weather.home`). If your HA instance uses a different
# entity id, set `input_text.rc_weather_entity_id`.

input_text:
  rc_weather_entity_id:
    name: "RC Weather Entity ID"
    initial: "weather.home"

  # Manual timezone override for RoamCore contract entities.
  # Leave blank to use HA's configured timezone (config.time_zone).
  rc_time_zone_override:
    name: "RC Time Zone Override"
    max: 64
    initial: ""

## NOTE:
# Template entities are defined in `roamcore_templates.yaml` to avoid Home Assistant
# packages list-override behavior.
