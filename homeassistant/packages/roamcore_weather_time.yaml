# RoamCore contract entities: Weather + Time (MVP)
# Naming convention reference:
#   RoamCore/docs/reference/rc-entity-naming.md

# NOTE (MVP): We assume the built-in Open-Meteo integration provides a
# weather entity (commonly `weather.home`). If your HA instance uses a different
# entity id, set `input_text.rc_weather_entity_id`.

input_text:
  rc_weather_entity_id:
    name: "RC Weather Entity ID"
    initial: "weather.home"

  # Manual timezone override for RoamCore contract entities.
  # Leave blank to use HA's configured timezone (config.time_zone).
  rc_time_zone_override:
    name: "RC Time Zone Override"
    max: 64
    initial: ""

template:
  - sensor:
      - name: "RC Weather Temperature"
        unique_id: rc_weather_temp_c
        object_id: rc_weather_temp_c
        unit_of_measurement: "°C"
        device_class: temperature
        state: >-
          {% set wid = states('input_text.rc_weather_entity_id') %}
          {% set t = state_attr(wid, 'temperature') %}
          {{ (t | float) if t is not none else 'unknown' }}
        availability: >-
          {% set wid = states('input_text.rc_weather_entity_id') %}
          {{ wid not in ['unknown','unavailable',''] and states(wid) not in ['unknown','unavailable'] and (state_attr(wid,'temperature') is not none) }}

      - name: "RC Weather Condition"
        unique_id: rc_weather_condition
        object_id: rc_weather_condition
        icon: "mdi:weather-partly-cloudy"
        state: >-
          {% set wid = states('input_text.rc_weather_entity_id') %}
          {{ states(wid) }}
        availability: >-
          {% set wid = states('input_text.rc_weather_entity_id') %}
          {{ wid not in ['unknown','unavailable',''] and states(wid) not in ['unknown','unavailable'] }}

      - name: "RC Time Local"
        unique_id: rc_time_local
        object_id: rc_time_local
        icon: "mdi:clock"
        state: >-
          {{ now().strftime('%Y-%m-%d %H:%M') }}

      - name: "RC Time Zone"
        unique_id: rc_time_zone
        object_id: rc_time_zone
        icon: "mdi:map-clock"
        state: >-
          {% set o = states('input_text.rc_time_zone_override') | trim %}
          {{ o if o else 'UTC' }}
