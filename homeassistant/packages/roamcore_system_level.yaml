# RoamCore contract entities: System level / tilt (MVP)
#
# MVP design:
# - Raw pitch/roll can come from the real IMU integration later.
# - HA stores calibration offsets in input_number.
# - Contract layer exposes "levelled" pitch/roll (raw - offset).
# - Also exposes a simple status and a human hint for how to adjust.
#
# Naming convention reference:
#   RoamCore/docs/reference/rc-entity-naming.md

input_number:
  rc_system_level_pitch_offset_deg:
    name: "RC System Level Pitch Offset"
    min: -45
    max: 45
    step: 0.1
    unit_of_measurement: "°"
    mode: box
    initial: 0

  rc_system_level_roll_offset_deg:
    name: "RC System Level Roll Offset"
    min: -45
    max: 45
    step: 0.1
    unit_of_measurement: "°"
    mode: box
    initial: 0

## NOTE:
# Template entities are defined in `roamcore_templates.yaml` to avoid Home Assistant
# packages list-override behavior.
