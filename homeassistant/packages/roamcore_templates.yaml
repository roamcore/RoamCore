# RoamCore template entities (consolidated)
#
# IMPORTANT:
# Home Assistant `packages:` does not merge lists across files.
# Multiple `template:` sections in different package files will override each other.
#
# So we keep ALL RoamCore `template:` entities in this single package file.

template:
  # --------
  # System level
  # --------
  - button:
      - name: "RC System Level Calibrate"
        unique_id: rc_system_level_calibrate
        object_id: rc_system_level_calibrate
        icon: mdi:target
        press:
          - service: input_number.set_value
            target:
              entity_id: input_number.rc_system_level_pitch_offset_deg
            data:
              value: "{{ states('sensor.rc_system_level_pitch_raw_deg') | float(0) }}"
          - service: input_number.set_value
            target:
              entity_id: input_number.rc_system_level_roll_offset_deg
            data:
              value: "{{ states('sensor.rc_system_level_roll_raw_deg') | float(0) }}"

  - sensor:
      - name: "RC System Level Pitch Raw"
        unique_id: rc_system_level_pitch_raw_deg
        object_id: rc_system_level_pitch_raw_deg
        unit_of_measurement: "°"
        state: "{{ states('input_number.rc_mock_system_level_pitch_deg') }}"

      - name: "RC System Level Roll Raw"
        unique_id: rc_system_level_roll_raw_deg
        object_id: rc_system_level_roll_raw_deg
        unit_of_measurement: "°"
        state: "{{ states('input_number.rc_mock_system_level_roll_deg') }}"

      - name: "RC System Level Pitch Deg"
        unique_id: rc_system_level_pitch_deg
        object_id: rc_system_level_pitch_deg
        unit_of_measurement: "°"
        state: >-
          {{ (states('sensor.rc_system_level_pitch_raw_deg')|float(0)
              - states('input_number.rc_system_level_pitch_offset_deg')|float(0))
              | round(2) }}

      - name: "RC System Level Roll Deg"
        unique_id: rc_system_level_roll_deg
        object_id: rc_system_level_roll_deg
        unit_of_measurement: "°"
        state: >-
          {{ (states('sensor.rc_system_level_roll_raw_deg')|float(0)
              - states('input_number.rc_system_level_roll_offset_deg')|float(0))
              | round(2) }}

      - name: "RC System Level Status"
        unique_id: rc_system_level_status
        object_id: rc_system_level_status
        icon: mdi:spirit-level
        state: >-
          {% set tol = 1.0 %}
          {% set p = states('sensor.rc_system_level_pitch_deg')|float(0) %}
          {% set r = states('sensor.rc_system_level_roll_deg')|float(0) %}
          {% set max_abs = [p|abs, r|abs] | max %}
          {% if max_abs <= tol %}
            level
          {% elif max_abs <= 3.0 %}
            close
          {% else %}
            adjust
          {% endif %}

      - name: "RC System Level Adjustment Hint"
        unique_id: rc_system_level_adjustment_hint
        object_id: rc_system_level_adjustment_hint
        icon: mdi:arrow-expand-all
        state: >-
          {% set tol = 1.0 %}
          {% set p = states('sensor.rc_system_level_pitch_deg')|float(0) %}
          {% set r = states('sensor.rc_system_level_roll_deg')|float(0) %}
          {% if (p|abs <= tol) and (r|abs <= tol) %}
            No adjustment needed
          {% else %}
            {% set parts = [] %}
            {% if p|abs > tol %}
              {% if p > 0 %}
                {% set _ = parts.append('Pitch +: lower front or raise rear') %}
              {% else %}
                {% set _ = parts.append('Pitch -: raise front or lower rear') %}
              {% endif %}
            {% endif %}
            {% if r|abs > tol %}
              {% if r > 0 %}
                {% set _ = parts.append('Roll +: lower left or raise right') %}
              {% else %}
                {% set _ = parts.append('Roll -: raise left or lower right') %}
              {% endif %}
            {% endif %}
            {{ parts | join('; ') }}
          {% endif %}

  - binary_sensor:
      - name: "RC System Level"
        unique_id: rc_system_level
        object_id: rc_system_level
        icon: mdi:spirit-level
        state: >-
          {% set tol = 1.0 %}
          {% set p = states('sensor.rc_system_level_pitch_deg')|float(0) %}
          {% set r = states('sensor.rc_system_level_roll_deg')|float(0) %}
          {{ (p|abs <= tol) and (r|abs <= tol) }}

  # --------
  # Location + trip mocks
  # --------
  - sensor:
      - name: "RC Location Lat"
        unique_id: rc_location_lat
        icon: mdi:latitude
        state: >-
          {% set e = states('input_text.rc_location_tracker_entity') %}
          {{ state_attr(e, 'latitude') | float(default=none) }}
        availability: >-
          {% set e = states('input_text.rc_location_tracker_entity') %}
          {{ e not in ['unknown','unavailable',''] and state_attr(e,'latitude') is not none }}

      - name: "RC Location Lon"
        unique_id: rc_location_lon
        icon: mdi:longitude
        state: >-
          {% set e = states('input_text.rc_location_tracker_entity') %}
          {{ state_attr(e, 'longitude') | float(default=none) }}
        availability: >-
          {% set e = states('input_text.rc_location_tracker_entity') %}
          {{ e not in ['unknown','unavailable',''] and state_attr(e,'longitude') is not none }}

      - name: "RC Location Accuracy"
        unique_id: rc_location_accuracy_m
        unit_of_measurement: "m"
        icon: mdi:target
        state: >-
          {% set e = states('input_text.rc_location_tracker_entity') %}
          {{ state_attr(e, 'gps_accuracy')
              | default(state_attr(e, 'accuracy'), true)
              | float(default=none) }}
        availability: >-
          {% set e = states('input_text.rc_location_tracker_entity') %}
          {{ e not in ['unknown','unavailable',''] and (state_attr(e,'gps_accuracy') is not none or state_attr(e,'accuracy') is not none) }}

      - name: "RC Location Source"
        unique_id: rc_location_source
        icon: mdi:radar
        state: >-
          {% set e = states('input_text.rc_location_tracker_entity') %}
          {{ 'traccar' if e and e != '' else 'unknown' }}

      - name: "RC Location Speed"
        unique_id: rc_location_speed
        icon: mdi:speedometer
        state: >-
          {% set e = states('input_text.rc_location_tracker_entity') %}
          {{ state_attr(e, 'speed') | float(default=none) }}

      - name: "RC Location Heading"
        unique_id: rc_location_heading_deg
        unit_of_measurement: "°"
        icon: mdi:compass
        state: >-
          {% set e = states('input_text.rc_location_tracker_entity') %}
          {{ state_attr(e, 'course') | default(state_attr(e, 'heading'), true) | float(default=none) }}

      - name: "RC Map Location"
        unique_id: rc_map_location
        state: "{{ states('input_text.rc_mock_map_location') }}"

      - name: "RC Map Elevation"
        unique_id: rc_map_elevation_m
        unit_of_measurement: "m"
        state: "{{ states('input_number.rc_mock_map_elevation_m') }}"

      - name: "RC Trip Distance Today"
        unique_id: rc_trip_distance_today_mi
        unit_of_measurement: "mi"
        state: "{{ states('input_number.rc_mock_trip_distance_today_mi') }}"

      - name: "RC Trip Distance Total"
        unique_id: rc_trip_distance_total_mi
        unit_of_measurement: "mi"
        state: "{{ states('input_number.rc_mock_trip_distance_total_mi') }}"

      - name: "RC Trip Time Today"
        unique_id: rc_trip_time_today
        state: "{{ states('input_text.rc_mock_trip_time_today') }}"

      - name: "RC Trip Time Total"
        unique_id: rc_trip_time_total
        state: "{{ states('input_text.rc_mock_trip_time_total') }}"

      - name: "RC Trip Segments"
        unique_id: rc_trip_segments
        state: "{{ states('input_number.rc_mock_trip_segments') }}"

      - name: "RC Trip Stops"
        unique_id: rc_trip_stops
        state: "{{ states('input_number.rc_mock_trip_stops') }}"

  # --------
  # Weather/time contract
  # --------
  - sensor:
      - name: "RC Weather Temperature"
        unique_id: rc_weather_temp_c
        object_id: rc_weather_temp_c
        unit_of_measurement: "°C"
        device_class: temperature
        state: >-
          {% set wid = states('input_text.rc_weather_entity_id') %}
          {% set t = state_attr(wid, 'temperature') %}
          {{ (t | float) if t is not none else 'unknown' }}
        availability: >-
          {% set wid = states('input_text.rc_weather_entity_id') %}
          {{ wid not in ['unknown','unavailable',''] and states(wid) not in ['unknown','unavailable'] and (state_attr(wid,'temperature') is not none) }}

      - name: "RC Weather Condition"
        unique_id: rc_weather_condition
        object_id: rc_weather_condition
        icon: mdi:weather-partly-cloudy
        state: >-
          {% set wid = states('input_text.rc_weather_entity_id') %}
          {{ states(wid) }}
        availability: >-
          {% set wid = states('input_text.rc_weather_entity_id') %}
          {{ wid not in ['unknown','unavailable',''] and states(wid) not in ['unknown','unavailable'] }}

      - name: "RC Time Local"
        unique_id: rc_time_local
        object_id: rc_time_local
        icon: mdi:clock
        state: "{{ now().strftime('%Y-%m-%d %H:%M') }}"

      - name: "RC Time Zone"
        unique_id: rc_time_zone
        object_id: rc_time_zone
        icon: mdi:map-clock
        state: >-
          {% set o = states('input_text.rc_time_zone_override') | trim %}
          {{ o if o else 'UTC' }}

