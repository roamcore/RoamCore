# RoamCore — OpenWrt Networking API (MVP)
#
# This package pulls networking state from the OpenWrt RoamCore API.
#
# Product default (final): OpenWrt router is at http://192.168.1.250:8080
# Dev network (current): OpenWrt VM is at http://192.168.1.250:8080
#
# If you are running in a different network, update all resource URLs below.

# IMPORTANT:
# - The OpenWrt API is LAN-only for MVP.
# - Auth is optional and disabled by default.

rest:
  # NOTE: Home Assistant REST resources are not template-able.
  # DEV: Using 192.168.1.250 (OpenWrt VM on VP2430)
  - resource: "http://192.168.1.250:8080/api/v1/status"
    scan_interval: 15
    sensor:
      - name: "RC OpenWrt Internet"
        unique_id: rc_openwrt_internet
        value_template: "{{ value_json.internet }}"
        icon: mdi:web

      - name: "RC OpenWrt Active WAN"
        unique_id: rc_openwrt_active_wan
        value_template: "{{ value_json.active_wan }}"
        icon: mdi:swap-horizontal

      - name: "RC OpenWrt Uptime"
        unique_id: rc_openwrt_uptime_s
        value_template: "{{ value_json.uptime_seconds }}"
        unit_of_measurement: "s"
        device_class: duration

  - resource: "http://192.168.1.250:8080/api/v1/wan"
    scan_interval: 15
    sensor:
      - name: "RC Preferred WAN"
        unique_id: rc_openwrt_preferred_wan
        value_template: "{{ value_json.preferred | default('') }}"
        icon: mdi:swap-horizontal

      - name: "RC Starlink State"
        unique_id: rc_openwrt_starlink_state
        value_template: "{{ value_json.starlink.state }}"
        icon: mdi:satellite-variant

      - name: "RC LTE State"
        unique_id: rc_openwrt_lte_state
        value_template: "{{ value_json.lte.state }}"
        icon: mdi:signal-4g

  # LTE/SIM diagnostics (MBIM) are separated so /wan stays fast for HA polling.
  - resource: "http://192.168.1.250:8080/api/v1/lte"
    scan_interval: 30
    sensor:
      - name: "RC LTE SIM State"
        unique_id: rc_openwrt_lte_sim_ready_state
        object_id: rc_lte_sim_state
        value_template: "{{ value_json.sim_ready_state | default('') }}"
        icon: mdi:sim

      - name: "RC LTE Registration"
        unique_id: rc_openwrt_lte_registration_state
        object_id: rc_lte_registration
        value_template: "{{ value_json.registration_state | default('') }}"
        icon: mdi:cellphone-wireless

      - name: "RC LTE Provider"
        unique_id: rc_openwrt_lte_provider_name
        object_id: rc_lte_provider
        value_template: "{{ value_json.provider_name | default('') }}"
        icon: mdi:cellphone-wireless

      - name: "RC LTE RSSI"
        unique_id: rc_openwrt_lte_signal_rssi
        object_id: rc_lte_rssi
        value_template: "{{ value_json.signal_rssi | default('') }}"
        icon: mdi:signal

  - resource: "http://192.168.1.250:8080/api/v1/system"
    scan_interval: 30
    sensor:
      - name: "RC Router CPU"
        unique_id: rc_openwrt_router_cpu_pct
        object_id: rc_router_cpu
        value_template: "{{ value_json.cpu_percent | float(0) }}"
        unit_of_measurement: "%"
        icon: mdi:cpu-64-bit

      - name: "RC Router Memory"
        unique_id: rc_openwrt_router_memory_pct
        object_id: rc_router_memory
        value_template: "{{ value_json.memory_percent | float(0) }}"
        unit_of_measurement: "%"
        icon: mdi:memory

      - name: "RC Router Temperature"
        unique_id: rc_openwrt_router_temp_c
        object_id: rc_router_temperature
        value_template: "{{ value_json.temperature_celsius | float(0) }}"
        unit_of_measurement: "°C"
        device_class: temperature

      - name: "RC Router Load (1m)"
        unique_id: rc_openwrt_router_load_1m
        value_template: "{{ value_json.load_1m | float(0) }}"
        icon: mdi:cpu-64-bit

      - name: "RC Router Uptime"
        unique_id: rc_openwrt_router_uptime_s
        value_template: "{{ value_json.uptime_seconds }}"
        unit_of_measurement: "s"
        device_class: duration

      - name: "RC Router Firmware"
        unique_id: rc_openwrt_router_firmware
        object_id: rc_router_firmware
        value_template: "{{ value_json.openwrt_version | default('') }}"

  - resource: "http://192.168.1.250:8080/api/v1/wifi"
    scan_interval: 30
    sensor:
      - name: "RC WiFi SSID"
        unique_id: rc_openwrt_wifi_ssid
        value_template: "{{ value_json.ssid }}"
        icon: mdi:wifi

      - name: "RC WiFi Clients"
        unique_id: rc_openwrt_wifi_clients
        value_template: "{{ value_json.client_count | int(0) }}"
        icon: mdi:devices

  - resource: "http://192.168.1.250:8080/api/v1/data_usage"
    scan_interval: 300
    sensor:
      - name: "RC Starlink Today Download"
        unique_id: rc_openwrt_starlink_today_rx_mb
        value_template: "{{ value_json.starlink.today_rx_mb | int(0) }}"
        unit_of_measurement: "MB"
        icon: mdi:download

      - name: "RC Starlink Month Download"
        unique_id: rc_openwrt_starlink_month_rx_mb
        value_template: "{{ value_json.starlink.month_rx_mb | int(0) }}"
        unit_of_measurement: "MB"
        icon: mdi:download

      - name: "RC LTE Today Download"
        unique_id: rc_openwrt_lte_today_rx_mb
        value_template: "{{ value_json.lte.today_rx_mb | int(0) }}"
        unit_of_measurement: "MB"
        icon: mdi:download

      - name: "RC LTE Month Download"
        unique_id: rc_openwrt_lte_month_rx_mb
        value_template: "{{ value_json.lte.month_rx_mb | int(0) }}"
        unit_of_measurement: "MB"
        icon: mdi:download


rest_command:
  rc_openwrt_set_wifi:
    url: "http://192.168.1.250:8080/api/v1/wifi"
    method: POST
    headers:
      Content-Type: application/json
    payload: '{"ssid":"{{ ssid }}","key":"{{ key }}"}'

  rc_openwrt_set_wan_preference:
    url: "http://192.168.1.250:8080/api/v1/wan/preference"
    method: POST
    headers:
      Content-Type: application/json
    payload: '{"preferred":"{{ preferred }}"}'

  rc_openwrt_restart_network:
    url: "http://192.168.1.250:8080/api/v1/restart"
    method: POST
