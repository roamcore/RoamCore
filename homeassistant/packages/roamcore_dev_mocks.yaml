# RoamCore dev mocks (temporary)
# Provides editable values for the RoamCore dashboard when real data sources are not connected yet.
#
# Keep all temporary/mock data isolated in this file so it is easy to remove later.
# Naming convention reference:
#   RoamCore/docs/reference/rc-entity-naming.md

