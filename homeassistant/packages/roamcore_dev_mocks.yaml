input_select:
  rc_mock_net_source:
    name: "RC Mock Net Source"
    options:
      - starlink
      - 4g
      - 5g
      - hybrid
    initial: starlink

  rc_mock_net_status:
    name: "RC Mock Net Status"
    options:
      - good
      - ok
      - bad
    initial: good

  rc_mock_power_inverter_status:
    name: "RC Mock Inverter Status"
    options:
      - on
      - off
      - standby
      - fault
    initial: on

input_boolean:
  rc_mock_power_shore_connected:
    name: "RC Mock Shore Connected"
    initial: false

input_text:
  rc_mock_map_location:
    name: "RC Mock Map Location"
    initial: "Lake District, UK"

  rc_mock_trip_time_today:
    name: "RC Mock Trip Time Today"
    initial: "1h 12m"

  rc_mock_trip_time_total:
    name: "RC Mock Trip Time Total"
    initial: "38h 04m"

  rc_mock_net_uptime:
    name: "RC Mock Net Uptime"
    initial: "4d 12h"

  rc_mock_net_last_disconnect:
    name: "RC Mock Net Last Disconnect"
    initial: "4 days ago"

  rc_mock_net_cell_provider:
    name: "RC Mock Cellular Provider"
    initial: "EE"

  rc_mock_net_cell_technology:
    name: "RC Mock Cellular Technology"
    initial: "4G LTE"

  rc_mock_net_ssid:
    name: "RC Mock WiFi SSID"
    initial: "RoamCore-Van"

  rc_mock_net_channel:
    name: "RC Mock WiFi Channel"
    initial: "36"

  rc_mock_net_frequency:
    name: "RC Mock WiFi Frequency"
    initial: "5GHz"

  rc_mock_router_uptime:
    name: "RC Mock Router Uptime"
    initial: "4d 12h 34m"

  rc_mock_router_firmware:
    name: "RC Mock Router Firmware"
    initial: "2.4.1"

input_datetime:
  rc_mock_level_last_calibrate:
    name: "RC Mock Level Last Calibrate"
    has_date: true
    has_time: true

template:
  - sensor:
      # POWER (contract layer)
      - name: "RC Power Battery SoC"
        unique_id: rc_power_battery_soc
        state: "{{ states('input_number.rc_mock_power_battery_soc') }}"
        unit_of_measurement: "%"
        icon: mdi:battery
      - name: "RC Power Battery Voltage"
        unique_id: rc_power_battery_voltage
        state: "{{ states('input_number.rc_mock_power_battery_voltage') }}"
        unit_of_measurement: "V"
      - name: "RC Power Battery Current"
        unique_id: rc_power_battery_current
        state: "{{ states('input_number.rc_mock_power_battery_current') }}"
        unit_of_measurement: "A"
      - name: "RC Power Battery Temperature C"
        unique_id: rc_power_battery_temperature_c
        state: "{{ states('input_number.rc_mock_power_battery_temperature_c') }}"
        unit_of_measurement: "°C"

      - name: "RC Power Battery Capacity"
        unique_id: rc_power_battery_capacity_ah
        state: "{{ states('input_number.rc_mock_power_battery_capacity_ah') }}"
        unit_of_measurement: "Ah"

      - name: "RC Power Battery Cycle Count"
