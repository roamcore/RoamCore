# RoamCore dev mocks (helpers only)
#
# This package intentionally defines ONLY input_* helpers used by other
# packages (power/net/etc). Do NOT define rc_* template entities here to
# avoid duplicate unique_id collisions.
input_number:
  rc_mock_power_battery_soc:
    name: RC Mock Power Battery SoC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: '%'
    mode: slider
    initial: 73
  rc_mock_power_solar_power:
    name: RC Mock Power Solar Power
    min: 0
    max: 5000
    step: 10
    unit_of_measurement: W
    mode: slider
    initial: 420
  rc_mock_power_load_power:
    name: RC Mock Power Load Power
    min: 0
    max: 5000
    step: 10
    unit_of_measurement: W
    mode: slider
    initial: 650
  rc_mock_net_download_mbps:
    name: RC Mock Net Download
    min: 0
    max: 500
    step: 1
    unit_of_measurement: Mbps
    mode: slider
    initial: 53
  rc_mock_net_upload_mbps:
    name: RC Mock Net Upload
    min: 0
    max: 200
    step: 1
    unit_of_measurement: Mbps
    mode: slider
    initial: 15
  rc_mock_net_ping_ms:
