# RoamCore contract entities: Location subsystem (MVP)
# Naming convention reference:
#   RoamCore/docs/reference/rc-entity-naming.md

# MVP notes:
# - Primary source for live coordinates is typically Traccar via HA's Traccar integration.
# - The built-in Lovelace map card requires a `device_tracker` entity, but the RoamCore
#   contract prefers `rc_*` sensors. We bridge by mapping tracker attributes -> rc_*.
# - Configure your upstream tracker entity_id once via `input_text.rc_location_tracker_entity`.

input_text:
  rc_location_tracker_entity:
    name: "RC Location Tracker Entity"
    # Example: device_tracker.traccar_van
    initial: "device_tracker.traccar_van"

## NOTE:
# Template entities are defined in `roamcore_templates.yaml` to avoid Home Assistant
# packages list-override behavior.
