<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>RoamCore — Trip Wrapped</title>
  <style>
    :root{
      --bg:#070A12;
      --card:#0B1020;
      --card2:#0A0F1C;
      --border:rgba(255,255,255,0.08);
      --text:rgba(255,255,255,0.92);
      --muted:rgba(255,255,255,0.62);
      --muted2:rgba(255,255,255,0.44);
      --accent:#6EE7FF;
      --accent2:#A78BFA;
      --good:#34D399;
      --warn:#FBBF24;
    }
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(1200px 700px at 70% -10%, rgba(110,231,255,0.10), transparent 60%), radial-gradient(900px 600px at 10% 0%, rgba(167,139,250,0.10), transparent 55%), var(--bg); color:var(--text); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
    .wrap{max-width:980px;margin:0 auto;padding:22px 16px 28px;}
    .top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap;}
    .brand{display:flex;gap:10px;align-items:center;}
    .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg, rgba(110,231,255,0.28), rgba(167,139,250,0.22)); border:1px solid var(--border); position:relative; overflow:hidden;}
    .logo:after{content:""; position:absolute; inset:-40%; background:radial-gradient(circle at 30% 30%, rgba(110,231,255,0.55), transparent 55%), radial-gradient(circle at 70% 70%, rgba(167,139,250,0.45), transparent 55%); transform:rotate(12deg);}
    .brandText{line-height:1.1;}
    .brandName{font-weight:900;letter-spacing:0.3px;font-size:14px;color:rgba(255,255,255,0.86)}
    .brandSub{font-size:12px;color:var(--muted)}

    .title{font-weight:950;font-size:22px;letter-spacing:-0.3px;margin:10px 0 0;}
    .subtitle{margin-top:6px;color:var(--muted); font-size:13px;}

    .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,0.03);font-size:12px;color:var(--muted);}
    .dot{width:7px;height:7px;border-radius:99px;background:var(--accent); box-shadow: 0 0 16px rgba(110,231,255,0.55);}

    .grid{display:grid;grid-template-columns: 1.6fr 1fr;gap:14px;margin-top:16px;}
    @media (max-width: 900px){ .grid{grid-template-columns:1fr;}}

    .card{background:linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.018)); border:1px solid var(--border); border-radius:16px; overflow:hidden;}
    .cardPad{padding:14px;}

    .mapBox{position:relative; height:420px; background: radial-gradient(900px 520px at 50% 20%, rgba(110,231,255,0.06), transparent 62%), radial-gradient(700px 450px at 15% 110%, rgba(167,139,250,0.08), transparent 55%), rgba(255,255,255,0.02);}
    .mapCanvas{position:absolute; inset:0; width:100%; height:100%;}
    .mapOverlay{position:absolute; left:14px; top:14px; right:14px; display:flex; justify-content:space-between; gap:10px; align-items:flex-start; pointer-events:none;}
    .mapTag{pointer-events:none; display:inline-flex; align-items:center; gap:8px; padding:8px 10px; border-radius:999px; border:1px solid var(--border); background:rgba(7,10,18,0.55); backdrop-filter: blur(10px); color:rgba(255,255,255,0.78); font-size:12px;}

    .kpis{display:grid; grid-template-columns:1fr; gap:10px;}
    .kpi{padding:12px;border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(0,0,0,0.16);}
    .kLabel{font-size:12px; color:var(--muted);}
    .kValue{margin-top:6px; font-size:26px; font-weight:950; letter-spacing:-0.6px;}
    .kSub{margin-top:2px; font-size:12px; color:var(--muted2);}

    .headline{display:grid; gap:10px;}
    .big{padding:14px 14px 12px; border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(0,0,0,0.16);}
    .bigLine{font-size:28px; font-weight:1000; letter-spacing:-0.8px;}
    .bigSub{margin-top:4px; color:var(--muted); font-size:12px;}

    .list{margin-top:12px; display:grid; gap:8px;}
    .row{display:flex; justify-content:space-between; gap:12px; padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02);}
    .row .l{color:var(--muted); font-size:12px;}
    .row .r{font-weight:800; font-size:12px; color:rgba(255,255,255,0.86); text-align:right;}

    .foot{margin-top:14px; color:rgba(255,255,255,0.45); font-size:11px; display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;}
    a{color:inherit}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="brand">
          <div class="logo"></div>
          <div class="brandText">
            <div class="brandName">RoamCore</div>
            <div class="brandSub">Trip Wrapped</div>
          </div>
        </div>
        <div class="title" id="title">Your RoamCore Journey</div>
        <div class="subtitle" id="subtitle">—</div>
      </div>
      <div class="pill"><span class="dot"></span><span id="generated">Generated —</span></div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="mapBox">
          <img class="mapCanvas" id="mapimg" alt="Trip route map" />
          <div class="mapOverlay">
            <div class="mapTag">Route · <span id="routeInfo">—</span></div>
            <div class="mapTag" id="mapHint">RoamCore Trip Wrapped</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="cardPad">
          <div class="headline" id="headline"></div>

          <div class="list" id="metrics"></div>

          <div class="foot">
            <div>Shareable recap · inspired by Strava × Wrapped</div>
            <div id="device">Device —</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /*__TRIP_WRAPPED_DATA__*/

    const d = window.TRIP_WRAPPED_DATA || {};
    const meta = d.meta || {};
    const stats = d.stats || {};

    const fmtKm = (m) => {
      const km = (Number(m)||0) / 1000;
      return km >= 100 ? km.toFixed(0) : km.toFixed(1);
    };
    const fmtInt = (n) => (Number(n)||0).toLocaleString();
    const fmt1 = (n) => (Number(n)||0).toFixed(1);
    const fmtDays = (d) => {
      d = Number(d)||0;
      if (d === 1) return '1 day';
      return `${fmtInt(d)} days`;
    };
    const fmtHours = (h) => {
      h = Number(h)||0;
      return h >= 10 ? `${h.toFixed(0)}h` : `${h.toFixed(1)}h`;
    };

    const clamp = (x,a,b) => Math.max(a, Math.min(b, x));

    const title = meta.title || 'Your RoamCore Journey';
    const from = meta.from ? new Date(meta.from) : null;
    const to = meta.to ? new Date(meta.to) : null;
    const gen = meta.generatedAt ? new Date(meta.generatedAt) : null;

    document.getElementById('title').textContent = title;
    // Subtitle: Month Year (derived from start)
    document.getElementById('subtitle').textContent = from ? from.toLocaleString(undefined, { month: 'long', year: 'numeric' }) : '—';
    document.getElementById('generated').textContent = gen ? `Generated ${gen.toLocaleString()}` : 'Generated —';
    document.getElementById('device').textContent = meta.deviceId ? `Device ${meta.deviceId}` : 'Device —';

    const totalM = Number(stats.totalDistanceM || 0);
    const totalDays = Number(stats.totalDays || 0);
    const stops = Number(stats.numberOfStops || 0);

    const headline = document.getElementById('headline');
    const addBig = (line, sub) => {
      const el = document.createElement('div');
      el.className = 'big';
      el.innerHTML = `<div class="bigLine">${line}</div><div class="bigSub">${sub||''}</div>`;
      headline.appendChild(el);
    };

    // Headline story metrics (max 3, as per spec)
    addBig(`${fmtInt(Math.round((Number(totalM)||0)/1000))} km travelled`, 'Distance covered');
    addBig(`${fmtInt(totalDays)} days on the road`, 'From your selected date range');
    addBig(`${fmtInt(stops)} stops`, 'Movement segments detected');

    // Secondary "cool" metrics (best-effort, from raw trips)
    const trips = Array.isArray(d.trips) ? d.trips : [];

    const safeNum = (x) => Number.isFinite(Number(x)) ? Number(x) : 0;

    const addRow = (l, r) => {
      const el = document.createElement('div');
      el.className = 'row';
      el.innerHTML = `<div class="l">${l}</div><div class="r">${r}</div>`;
      document.getElementById('metrics').appendChild(el);
    };

    // Behaviour metrics (secondary)
    const avgDaysPerStop = stats.avgDaysPerStop;
    if (avgDaysPerStop !== null && avgDaysPerStop !== undefined && Number.isFinite(Number(avgDaysPerStop))) {
      addRow('Movement frequency', `You moved every ${fmt1(avgDaysPerStop)} days`);
    }
    const longestDriveM = Number(stats.longestDriveM || 0);
    if (longestDriveM > 0) {
      addRow('Longest drive', `${fmtKm(longestDriveM)} km`);
    }
    const lsMs = Number(stats.longestStopDurationMs || 0);
    const lsName = (stats.longestStopLocationName || '').toString().trim();
    if (lsMs > 0) {
      const d = Math.max(0.1, lsMs / (1000*60*60*24));
      const dTxt = d >= 2 ? `${d.toFixed(0)} days` : `${d.toFixed(1)} days`;
      addRow('Longest stop', lsName ? `${lsName} (${dTxt})` : `${dTxt}`);
    }

    // Fun/shareable: stationary vs moving
    const pct = Number(stats.percentStationary);
    const movingH = Number(stats.movingHours || 0);
    const stationaryH = Number(stats.stationaryHours || 0);
    if (Number.isFinite(pct) && pct >= 0) {
      addRow('Trip rhythm', `${pct.toFixed(0)}% stationary · ${fmtHours(movingH)} moving`);
    }

    // Additional story metrics (keep it short; bottom section)
    const totalH = Number(stats.totalHours || 0);
    if (totalH > 0) {
      addRow('Time window', `${fmtHours(totalH)} total`);
    }
    if (stationaryH > 0) {
      addRow('Time parked', `${fmtHours(stationaryH)}`);
    }
    if (movingH > 0) {
      addRow('Time driving', `${fmtHours(movingH)}`);
    }

    // More story metrics (still deterministic)
    const avgDaily = Number(stats.avgDailyDistanceKm);
    if (Number.isFinite(avgDaily) && avgDaily > 0) {
      addRow('Average day', `${avgDaily.toFixed(0)} km/day`);
    }
    const avgSpd = Number(stats.avgSpeedKph);
    if (Number.isFinite(avgSpd) && avgSpd > 0) {
      addRow('Cruising pace', `${avgSpd.toFixed(0)} km/h`);
    }
    const nights = Number(stats.nightsParked);
    if (Number.isFinite(nights) && nights >= 1) {
      addRow('Nights parked', `${Math.round(nights)}`);
    }

    const disp = Number(stats.displacementKm);
    if (Number.isFinite(disp) && disp > 0) {
      addRow('As the crow flies', `${disp.toFixed(0)} km start → end`);
    }
    const loop = Number(stats.loopiness);
    if (Number.isFinite(loop) && loop > 0) {
      addRow('Detour factor', `${loop.toFixed(1)}×`);
    }

    // Start → End (best-effort from route endpoints)
    try {
      if (route && route.length >= 2) {
        const a = route[0];
        const b = route[route.length-1];
        const lat1 = Number(a.lat), lon1 = Number(a.lon);
        const lat2 = Number(b.lat), lon2 = Number(b.lon);
        if (Number.isFinite(lat1) && Number.isFinite(lon1) && Number.isFinite(lat2) && Number.isFinite(lon2)) {
          const s1 = `${lat1.toFixed(3)}, ${lon1.toFixed(3)}`;
          const s2 = `${lat2.toFixed(3)}, ${lon2.toFixed(3)}`;
          addRow('Start → End', `${s1} → ${s2}`);
        }
      }
    } catch(e) {}

    // --- Static map snapshot (non-interactive) ---
    // We render a MapLibre map once (raster OSM w/ labels) then snapshot it to PNG
    // and replace the map with a simple <img> so users cannot pan/zoom.
    const route = Array.isArray(stats.journeyRoute) ? stats.journeyRoute : (Array.isArray(stats.topTripRoute) ? stats.topTripRoute : []);
    const mapimg = document.getElementById('mapimg');
    const mapBox = document.querySelector('.mapBox');

    const loadCss = (href) => new Promise((res, rej) => {
      const l=document.createElement('link'); l.rel='stylesheet'; l.href=href; l.onload=res; l.onerror=rej; document.head.appendChild(l);
    });
    const loadJs = (src) => new Promise((res, rej) => {
      const s=document.createElement('script'); s.src=src; s.defer=true; s.onload=res; s.onerror=rej; document.head.appendChild(s);
    });

    const fitBounds = (m, coords) => {
      let minLat= 90, minLon=180, maxLat=-90, maxLon=-180;
      for (const p of coords){
        const lat=Number(p.lat), lon=Number(p.lon);
        if(!Number.isFinite(lat)||!Number.isFinite(lon)) continue;
        minLat=Math.min(minLat,lat); minLon=Math.min(minLon,lon);
        maxLat=Math.max(maxLat,lat); maxLon=Math.max(maxLon,lon);
      }
      if (minLat>maxLat) return;
      m.fitBounds([[minLon, minLat],[maxLon, maxLat]], {padding: 40, duration: 0});
    };

    const renderStaticSnapshot = async () => {
      if (!route || route.length < 2) {
        mapimg.style.display = 'none';
        document.getElementById('routeInfo').textContent = '—';
        return;
      }
      document.getElementById('routeInfo').textContent = `${Number(route.length||0)} pts`;

      // Create a temporary div for MapLibre
      const div = document.createElement('div');
      div.style.position='absolute';
      div.style.inset='0';
      mapBox.appendChild(div);

      // Load MapLibre from local HA assets
      const base = '/local/roamcore/vendor/maplibre-gl';
      await loadCss(base + '/maplibre-gl.css');
      await loadJs(base + '/maplibre-gl.js');

      const style = {
        version: 8,
        sources: {
          osm: {
            type: 'raster',
            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
            tileSize: 256,
            attribution: '© OpenStreetMap contributors'
          }
        },
        layers: [
          {id:'osm', type:'raster', source:'osm', paint:{'raster-opacity': 0.92, 'raster-saturation': -0.2, 'raster-contrast': 0.1}}
        ]
      };

      // @ts-ignore
      const map = new maplibregl.Map({
        container: div,
        style,
        interactive: false,
        attributionControl: false,
        preserveDrawingBuffer: true,
      });

      map.once('load', () => {
        // Add route layer
        const coords = route.map(p => [Number(p.lon), Number(p.lat)]).filter(x => Number.isFinite(x[0]) && Number.isFinite(x[1]));
        map.addSource('route', {type:'geojson', data:{type:'Feature', geometry:{type:'LineString', coordinates: coords}}});
        map.addLayer({id:'route-glow', type:'line', source:'route', paint:{'line-color':'#6EE7FF','line-width':7,'line-opacity':0.35}});
        map.addLayer({id:'route', type:'line', source:'route', paint:{'line-color':'#E6FDFF','line-width':3,'line-opacity':0.95}});
        // Start/end dots
        const start = coords[0];
        const end = coords[coords.length-1];
        map.addSource('se', {type:'geojson', data:{type:'FeatureCollection', features:[
          {type:'Feature', properties:{c:'#34D399'}, geometry:{type:'Point', coordinates:start}},
          {type:'Feature', properties:{c:'#FBBF24'}, geometry:{type:'Point', coordinates:end}},
        ]}});
        map.addLayer({id:'se', type:'circle', source:'se', paint:{'circle-radius':5,'circle-color':['get','c'],'circle-stroke-color':'#0B1020','circle-stroke-width':2}});
        fitBounds(map, route);
      });

      map.once('idle', () => {
        try {
          const png = map.getCanvas().toDataURL('image/png');
          map.remove();
          div.remove();
          mapimg.src = png;
          mapimg.style.display = 'block';
        } catch (e) {
          try { map.remove(); } catch(e2) {}
          try { div.remove(); } catch(e3) {}
        }
      });
    };

    renderStaticSnapshot();
  </script>
</body>
</html>
