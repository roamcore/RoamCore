<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>RoamCore — Trip Wrapped</title>
  <style>
    :root{
      --bg:#070A12;
      --panel:#0A1020;
      --panel2:#0B1328;
      --border:rgba(255,255,255,0.10);
      --text:rgba(255,255,255,0.92);
      --muted:rgba(255,255,255,0.62);
      --muted2:rgba(255,255,255,0.44);
      --accent:#6EE7FF;
      --accent2:#A78BFA;
      --accent3:#FF7A45;
    }
    *{box-sizing:border-box}
    body{margin:0;background:
      radial-gradient(900px 600px at 80% 0%, rgba(110,231,255,0.10), transparent 55%),
      radial-gradient(900px 600px at 10% 0%, rgba(167,139,250,0.10), transparent 55%),
      radial-gradient(900px 800px at 50% 120%, rgba(255,122,69,0.06), transparent 55%),
      var(--bg);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    /* Phone-like card */
    .wrap{max-width:560px;margin:0 auto;padding:22px 14px 26px;}
    .frame{
      border-radius:22px;
      padding:12px;
      background: linear-gradient(135deg, rgba(110,231,255,0.35), rgba(167,139,250,0.22), rgba(255,122,69,0.18));
      box-shadow: 0 30px 90px rgba(0,0,0,0.55);
    }
    .card{
      border-radius:18px;
      overflow:hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border:1px solid rgba(255,255,255,0.10);
      position:relative;
    }
    .card:before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(800px 520px at 50% -40%, rgba(110,231,255,0.10), transparent 60%),
        radial-gradient(700px 520px at 0% 140%, rgba(167,139,250,0.10), transparent 58%),
        radial-gradient(700px 520px at 100% 140%, rgba(255,122,69,0.08), transparent 58%);
      pointer-events:none;
      opacity:0.85;
    }
    .inner{position:relative; padding:18px 16px 16px;}

    .top{display:flex;flex-direction:column;gap:8px;align-items:center;text-align:center;}
    .brandName{font-weight:900;letter-spacing:1px;font-size:14px;color:rgba(110,231,255,0.85)}
    .title{font-weight:1000;font-size:32px;letter-spacing:-0.6px;margin:0; text-transform:uppercase;}
    .subtitle{margin-top:2px;color:var(--muted); font-size:13px;}

    .mapBox{margin-top:14px; border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.02);
      position:relative;
      height:280px;
    }
    .mapImg{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none;}
    .mapCanvas{position:absolute; inset:0; width:100%; height:100%; display:block;}
    .mapFallback{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center;
      padding:18px;
      color: rgba(255,255,255,0.68);
      background:
        radial-gradient(700px 280px at 30% 20%, rgba(110,231,255,0.10), transparent 60%),
        radial-gradient(700px 280px at 70% 80%, rgba(167,139,250,0.10), transparent 60%),
        rgba(8,12,24,0.55);
    }
    .mapFallback b{color: rgba(255,255,255,0.88)}

    .stats{display:grid; gap:10px; margin-top:14px; grid-template-columns:1fr 1fr;}
    .stat{
      display:grid;
      grid-template-columns: 44px 1fr;
      gap:10px;
      align-items:center;
      padding:12px 12px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(8,12,24,0.45);
      backdrop-filter: blur(10px);
      min-height:78px;
    }
    .icon{
      width:44px;height:44px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      border:1px solid rgba(255,255,255,0.14);
      background: linear-gradient(135deg, rgba(110,231,255,0.18), rgba(167,139,250,0.12));
      color: rgba(255,255,255,0.90);
      font-size:22px;
    }
    .icon svg{width:22px;height:22px;display:block;opacity:0.95}
    .k{font-size:12px; color: rgba(255,255,255,0.62); letter-spacing:0.6px; text-transform:uppercase;}
    .v{margin-top:4px; font-size:24px; font-weight:1000; letter-spacing:-0.6px; line-height:1.02;}
    .v small{font-weight:900; font-size:14px; color: rgba(255,255,255,0.62); margin-left:6px;}

    .chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
    .chip{font-size:12px; padding:7px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.82);
      letter-spacing:0.1px;
    }
    .chip.hot{border-color: rgba(110,231,255,0.35); background: rgba(110,231,255,0.07)}

    .elevBox{margin-top:14px; padding:12px; border-radius:14px; border:1px solid rgba(255,255,255,0.12);
      background: rgba(8,12,24,0.45); backdrop-filter: blur(10px);
    }
    .elevHead{font-size:12px; color: rgba(255,255,255,0.62); letter-spacing:0.6px; text-transform:uppercase; margin-bottom:8px;}
    #elevChart{width:100%; height:120px; display:block;}

    .hiBox{margin-top:14px; padding:12px; border-radius:14px; border:1px solid rgba(255,255,255,0.12);
      background: rgba(8,12,24,0.45); backdrop-filter: blur(10px);
    }
    .hiHead{display:flex; align-items:baseline; justify-content:space-between; gap:10px;}
    .hiTitle{font-size:12px; color: rgba(255,255,255,0.72); letter-spacing:0.6px; text-transform:uppercase;}
    .hiSub{font-size:11px; color: rgba(255,255,255,0.44);}

    .foot{margin-top:14px; color:rgba(255,255,255,0.45); font-size:11px; display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;}
    a{color:inherit}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="frame">
      <div class="card">
        <div class="inner">
          <div class="top">
            <div class="brandName" id="brand">ROAMCORE:</div>
            <h1 class="title" id="title">TRIP WRAPPED</h1>
            <div class="subtitle" id="subtitle">—</div>
          </div>

          <div class="mapBox">
            <img class="mapImg" id="mapimg" alt="Trip route map" />
            <canvas class="mapCanvas" id="mapCanvas" aria-label="Trip route" role="img"></canvas>
            <div class="mapFallback" id="mapFallback"><div><b>Route preview</b><br/><span style="opacity:.8">(offline)</span></div></div>
          </div>

          <div class="stats">
            <div class="stat">
              <div class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M3 14V7.8c0-.9.6-1.7 1.5-1.9l9.8-2.2c1.2-.3 2.4.6 2.4 1.9V6h1.6c.8 0 1.6.4 2 1.1l1.3 2.1c.3.5.4 1 .4 1.6V14" stroke="rgba(255,255,255,0.92)" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M5.5 14h13" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round"/>
                  <circle cx="7" cy="17" r="2" fill="rgba(110,231,255,0.95)"/>
                  <circle cx="17" cy="17" r="2" fill="rgba(255,122,69,0.95)"/>
                </svg>
              </div>
              <div>
                <div class="k">Total distance</div>
                <div class="v" id="statDistance">—</div>
              </div>
            </div>
            <div class="stat">
              <div class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M9 2h6" stroke="rgba(255,255,255,0.75)" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M12 7a8 8 0 1 0 0 16 8 8 0 0 0 0-16Z" stroke="rgba(255,255,255,0.92)" stroke-width="1.8"/>
                  <path d="M12 11v4l2.5 1.5" stroke="rgba(110,231,255,0.95)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div>
                <div class="k">Total time</div>
                <div class="v" id="statTime">—</div>
              </div>
            </div>
            <div class="stat">
              <div class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M3 19l6-10 4 6 2-3 6 7H3Z" stroke="rgba(255,255,255,0.92)" stroke-width="1.8" stroke-linejoin="round"/>
                  <path d="M9 9l1.5 2.3" stroke="rgba(110,231,255,0.85)" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </div>
              <div>
                <div class="k">Elevation gain</div>
                <div class="v" id="statElev">—</div>
              </div>
            </div>
            <div class="stat">
              <div class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M8 3h8l5 5v8l-5 5H8l-5-5V8l5-5Z" stroke="rgba(255,255,255,0.92)" stroke-width="1.8" stroke-linejoin="round"/>
                  <path d="M9 12h6" stroke="rgba(255,122,69,0.95)" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </div>
              <div>
                <div class="k">Total stops</div>
                <div class="v" id="statStops">—</div>
              </div>
            </div>
          </div>

          <div class="hiBox" id="hiBox" style="display:none;">
            <div class="hiHead">
              <div class="hiTitle">Highlights</div>
              <div class="hiSub" id="hiSub">—</div>
            </div>
            <div class="chips" id="hiChips"></div>
          </div>

          <div class="elevBox" id="elevBox" style="display:none;">
            <div class="elevHead">Elevation profile</div>
            <canvas id="elevChart"></canvas>
          </div>

          <div class="foot">
            <div id="generated">Generated —</div>
            <div id="device">Device —</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /*__TRIP_WRAPPED_DATA__*/

    const d = window.TRIP_WRAPPED_DATA || {};
    const meta = d.meta || {};
    const stats = d.stats || {};
    const comps = d.comparisons || {};

    const fmtKm = (m) => {
      const km = (Number(m)||0) / 1000;
      return km >= 100 ? km.toFixed(0) : km.toFixed(1);
    };
    const fmtMi = (m) => {
      const mi = (Number(m)||0) / 1609.344;
      return mi >= 100 ? mi.toFixed(0) : mi.toFixed(1);
    };
    const fmtInt = (n) => (Number(n)||0).toLocaleString();
    const fmt1 = (n) => (Number(n)||0).toFixed(1);
    const fmtDays = (d) => {
      d = Number(d)||0;
      if (d === 1) return '1 day';
      return `${fmtInt(d)} days`;
    };
    const fmtHours = (h) => {
      h = Number(h)||0;
      return h >= 10 ? `${h.toFixed(0)}h` : `${h.toFixed(1)}h`;
    };

    const clamp = (x,a,b) => Math.max(a, Math.min(b, x));

    const title = meta.title || 'Your RoamCore Journey';
    const from = meta.from ? new Date(meta.from) : null;
    const to = meta.to ? new Date(meta.to) : null;
    const gen = meta.generatedAt ? new Date(meta.generatedAt) : null;

    const fmtDateUTC = (dt) => {
      try {
        if (!dt) return '—';
        const y = dt.getUTCFullYear();
        const m = String(dt.getUTCMonth()+1).padStart(2,'0');
        const d0 = String(dt.getUTCDate()).padStart(2,'0');
        return `${d0}/${m}/${y}`;
      } catch(e){ return '—'; }
    };

    document.getElementById('title').textContent = title.toUpperCase();
    // Use UTC dates to avoid “next day” surprises when viewing in local time.
    document.getElementById('subtitle').textContent = from && to
      ? `${fmtDateUTC(from)} → ${fmtDateUTC(to)}`
      : (from ? fmtDateUTC(from) : '—');
    document.getElementById('generated').textContent = gen ? `Generated ${gen.toLocaleString()}` : 'Generated —';
    document.getElementById('device').textContent = meta.deviceId ? `Device ${meta.deviceId}` : 'Device —';

    const totalM = Number(stats.totalDistanceM || 0);
    const totalDays = Number(stats.totalDays || 0);
    const stops = Number(stats.numberOfStops || 0);
    const totalDurMs = Number(stats.totalDurationMs || 0);
    const movingHours = Number(stats.movingHours || 0);

    // Stat tiles
    const unit = (meta.units || '').toString().toLowerCase();
    const useMiles = unit === 'imperial' || unit === 'us' || unit === 'mi' || unit === 'miles';
    const distTxt = useMiles
      ? `${fmtInt(Math.round(Number(totalM)/1609.344))} MILES`
      : `${fmtInt(Math.round(Number(totalM)/1000))} KM`;
    document.getElementById('statDistance').textContent = distTxt;

    // Total time (prefer moving time if available; span time can be misleading for "today")
    try {
      const totalH = movingHours > 0 ? movingHours : (totalDurMs > 0 ? (totalDurMs / (1000*60*60)) : 0);
      if (totalH > 0) {
        const d = Math.floor(totalH / 24);
        const h = Math.round(totalH - d*24);
        const txt = d >= 1 ? `${fmtInt(d)}D ${fmtInt(h)}H` : `${fmtInt(Math.round(totalH))}H`;
        document.getElementById('statTime').textContent = txt;
      } else {
        document.getElementById('statTime').textContent = totalDays ? `${fmtInt(totalDays)} DAYS` : '—';
      }
    } catch(e) { document.getElementById('statTime').textContent = '—'; }

    const elevM = Number(stats.totalElevationGainM || stats.elevationGainM || 0);
    if (elevM > 0) {
      const ft = elevM * 3.28084;
      const elevTxt = useMiles ? `${fmtInt(Math.round(ft))} FT` : `${fmtInt(Math.round(elevM))} M`;
      document.getElementById('statElev').textContent = elevTxt;
    } else {
      document.getElementById('statElev').textContent = '—';
    }

    // Elevation profile chart (best-effort)
    try {
      const prof = stats.elevationProfile && Array.isArray(stats.elevationProfile.points)
        ? stats.elevationProfile
        : null;
      if (prof && prof.points.length >= 2) {
        const pts = prof.points
          .map(p => ({x: Number(p.dKm), y: Number(p.alt)}))
          .filter(p => Number.isFinite(p.x) && Number.isFinite(p.y));
        if (pts.length >= 2) {
          const box = document.getElementById('elevBox');
          const c = document.getElementById('elevChart');
          box.style.display = '';

          const dpr = window.devicePixelRatio || 1;
          const w = Math.max(1, c.clientWidth || 1);
          const h = Math.max(1, c.clientHeight || 120);
          c.width = Math.floor(w * dpr);
          c.height = Math.floor(h * dpr);
          const ctx = c.getContext('2d');
          ctx.scale(dpr, dpr);

          const pad = 8;
          const minX = Math.min(...pts.map(p => p.x));
          const maxX = Math.max(...pts.map(p => p.x));
          const minY = Math.min(...pts.map(p => p.y));
          const maxY = Math.max(...pts.map(p => p.y));
          const dx = Math.max(1e-9, maxX - minX);
          const dy = Math.max(1e-9, maxY - minY);

          const X = (x) => pad + ((x - minX) / dx) * (w - pad * 2);
          const Y = (y) => (h - pad) - ((y - minY) / dy) * (h - pad * 2);

          // Background grid (subtle)
          ctx.clearRect(0, 0, w, h);
          ctx.lineWidth = 1;
          ctx.strokeStyle = 'rgba(255,255,255,0.08)';
          for (let i=1;i<=3;i++) {
            const yy = pad + (i/4)*(h-pad*2);
            ctx.beginPath(); ctx.moveTo(pad, yy); ctx.lineTo(w-pad, yy); ctx.stroke();
          }

          // Area fill
          ctx.beginPath();
          ctx.moveTo(X(pts[0].x), h - pad);
          for (const p of pts) ctx.lineTo(X(p.x), Y(p.y));
          ctx.lineTo(X(pts[pts.length-1].x), h - pad);
          ctx.closePath();
          ctx.fillStyle = 'rgba(110,231,255,0.10)';
          ctx.fill();

          // Line
          ctx.beginPath();
          for (let i=0;i<pts.length;i++) {
            const p = pts[i];
            const xx = X(p.x), yy = Y(p.y);
            if (i===0) ctx.moveTo(xx, yy); else ctx.lineTo(xx, yy);
          }
          ctx.strokeStyle = 'rgba(110,231,255,0.90)';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }
    } catch (e) {}

    // Hide elevation box when no usable data (avoid empty chart area).
    try {
      const box = document.getElementById('elevBox');
      const prof = stats.elevationProfile && Array.isArray(stats.elevationProfile.points) ? stats.elevationProfile : null;
      if (box && !(prof && prof.points && prof.points.length >= 2)) box.style.display = 'none';
    } catch(e) {}

    document.getElementById('statStops').textContent = stops
      ? `${fmtInt(stops)} ${stops === 1 ? 'STOP' : 'STOPS'}`
      : '—';

    // Highlights (local history comparisons)
    try {
      const hiBox = document.getElementById('hiBox');
      const hiChips = document.getElementById('hiChips');
      const hiSub = document.getElementById('hiSub');
      const insights = Array.isArray(comps.insights) ? comps.insights : [];
      const histCount = Number(comps.historyCount || 0);
      if (hiBox && hiChips && (insights.length || histCount)) {
        hiBox.style.display = 'block';
        if (hiSub) hiSub.textContent = histCount ? `vs ${histCount} past trips` : 'First trip';
        const add = (txt, hot=false) => {
          const el = document.createElement('div');
          el.className = hot ? 'chip hot' : 'chip';
          el.textContent = txt;
          hiChips.appendChild(el);
        };
        for (const it of insights) {
          if (!it) continue;
          if (typeof it === 'string') {
            const st = it.trim();
            if (st) add(st, st.toLowerCase().includes('record'));
            continue;
          }
          if (typeof it === 'object') {
            const title = String(it.title || it.kind || '').trim();
            if (title) add(title, String(it.kind||'') === 'record');
          }
        }

        // Traveller type (short + story friendly)
        if (comps.travellerType && comps.travellerType.label) {
          add(String(comps.travellerType.label), false);
        }
      }
    } catch(e) {}

    // --- Static map snapshot (non-interactive) ---
    // We render a MapLibre map once (raster OSM w/ labels) then snapshot it to PNG
    // and replace the map with a simple <img> so users cannot pan/zoom.
    const route = Array.isArray(stats.journeyRoute) ? stats.journeyRoute : (Array.isArray(stats.topTripRoute) ? stats.topTripRoute : []);
    const mapimg = document.getElementById('mapimg');
    const mapCanvas = document.getElementById('mapCanvas');
    const mapFallback = document.getElementById('mapFallback');

    const showImg = (src) => {
      try {
        if (src) mapimg.src = src;
        mapimg.style.display = 'block';
        if (mapCanvas) mapCanvas.style.display = 'none';
        if (mapFallback) mapFallback.style.display = 'none';
      } catch(e) {}
    };

    const showCanvas = () => {
      try {
        mapimg.style.display = 'none';
        if (mapCanvas) mapCanvas.style.display = 'block';
        if (mapFallback) mapFallback.style.display = 'none';
      } catch(e) {}
    };

    const showFallback = () => {
      try {
        mapimg.style.display = 'none';
        if (mapCanvas) mapCanvas.style.display = 'none';
        if (mapFallback) mapFallback.style.display = 'flex';
      } catch(e) {}
    };

    mapimg.addEventListener('error', () => showCanvas());

    const drawRouteCanvas = () => {
      try {
        if (!mapCanvas) return false;
        if (!route || route.length < 2) return false;
        const pts = route
          .map(p => ({lat: Number(p.lat), lon: Number(p.lon)}))
          .filter(p => Number.isFinite(p.lat) && Number.isFinite(p.lon));
        if (pts.length < 2) return false;

        const dpr = window.devicePixelRatio || 1;
        const w = Math.max(1, mapCanvas.clientWidth || 1);
        const h = Math.max(1, mapCanvas.clientHeight || 1);
        mapCanvas.width = Math.floor(w * dpr);
        mapCanvas.height = Math.floor(h * dpr);
        const ctx = mapCanvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // Background
        const g = ctx.createLinearGradient(0, 0, w, h);
        g.addColorStop(0, 'rgba(110,231,255,0.10)');
        g.addColorStop(0.55, 'rgba(167,139,250,0.10)');
        g.addColorStop(1, 'rgba(255,122,69,0.08)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = 'rgba(8,12,24,0.55)';
        ctx.fillRect(0, 0, w, h);

        // Bounds
        let minLat= 90, minLon=180, maxLat=-90, maxLon=-180;
        for (const p of pts){
          minLat=Math.min(minLat,p.lat); minLon=Math.min(minLon,p.lon);
          maxLat=Math.max(maxLat,p.lat); maxLon=Math.max(maxLon,p.lon);
        }
        if (minLat > maxLat) return false;

        const pad = 26;
        const dx = Math.max(1e-9, maxLon - minLon);
        const dy = Math.max(1e-9, maxLat - minLat);
        const X = (lon) => pad + ((lon - minLon) / dx) * (w - pad*2);
        const Y = (lat) => (h - pad) - ((lat - minLat) / dy) * (h - pad*2);

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        const draw = (lw, stroke) => {
          ctx.beginPath();
          for (let i=0;i<pts.length;i++) {
            const p = pts[i];
            const xx = X(p.lon), yy = Y(p.lat);
            if (i===0) ctx.moveTo(xx, yy); else ctx.lineTo(xx, yy);
          }
          ctx.lineWidth = lw;
          ctx.strokeStyle = stroke;
          ctx.stroke();
        };
        draw(10, 'rgba(110,231,255,0.20)');
        draw(6, 'rgba(167,139,250,0.25)');
        draw(3, 'rgba(110,231,255,0.95)');

        const dot = (p, fill) => {
          ctx.beginPath();
          ctx.arc(X(p.lon), Y(p.lat), 5, 0, Math.PI*2);
          ctx.fillStyle = fill;
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.55)';
          ctx.lineWidth = 1;
          ctx.stroke();
        };
        dot(pts[0], 'rgba(110,231,255,0.95)');
        dot(pts[pts.length-1], 'rgba(255,122,69,0.95)');
        return true;
      } catch(e) {
        return false;
      }
    };

    // Prefer a pre-rendered static PNG generated at export time; else draw an offline preview.
    if (meta.mapImageUrl) {
      showImg(meta.mapImageUrl);
    } else {
      const ok = drawRouteCanvas();
      if (ok) showCanvas(); else showFallback();
    }


  </script>
</body>
</html>
