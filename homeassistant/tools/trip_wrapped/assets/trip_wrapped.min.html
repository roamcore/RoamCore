<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>RoamCore — Trip Wrapped</title>
  <style>
    :root{
      --bg:#070A12;
      --panel:#0A1020;
      --panel2:#0B1328;
      --border:rgba(255,255,255,0.10);
      --text:rgba(255,255,255,0.92);
      --muted:rgba(255,255,255,0.62);
      --muted2:rgba(255,255,255,0.44);
      --accent:#6EE7FF;
      --accent2:#A78BFA;
      --accent3:#FF7A45;
    }
    *{box-sizing:border-box}
    body{margin:0;background:
      radial-gradient(900px 600px at 80% 0%, rgba(110,231,255,0.10), transparent 55%),
      radial-gradient(900px 600px at 10% 0%, rgba(167,139,250,0.10), transparent 55%),
      radial-gradient(900px 800px at 50% 120%, rgba(255,122,69,0.06), transparent 55%),
      var(--bg);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    /* Phone-like card */
    .wrap{max-width:560px;margin:0 auto;padding:22px 14px 26px;}
    .frame{
      border-radius:22px;
      padding:12px;
      background: linear-gradient(135deg, rgba(110,231,255,0.35), rgba(167,139,250,0.22), rgba(255,122,69,0.18));
      box-shadow: 0 30px 90px rgba(0,0,0,0.55);
    }
    .card{
      border-radius:18px;
      overflow:hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border:1px solid rgba(255,255,255,0.10);
      position:relative;
    }
    .card:before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(800px 520px at 50% -40%, rgba(110,231,255,0.10), transparent 60%),
        radial-gradient(700px 520px at 0% 140%, rgba(167,139,250,0.10), transparent 58%),
        radial-gradient(700px 520px at 100% 140%, rgba(255,122,69,0.08), transparent 58%);
      pointer-events:none;
      opacity:0.85;
    }
    .inner{position:relative; padding:18px 16px 16px;}

    .top{display:flex;flex-direction:column;gap:8px;align-items:center;text-align:center;}
    .brandName{font-weight:900;letter-spacing:1px;font-size:14px;color:rgba(110,231,255,0.85)}
    .title{font-weight:1000;font-size:32px;letter-spacing:-0.6px;margin:0; text-transform:uppercase;}
    .subtitle{margin-top:2px;color:var(--muted); font-size:13px;}

    .mapBox{margin-top:14px; border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.02);
      position:relative;
      height:280px;
    }
    .mapCanvas{position:absolute; inset:0; width:100%; height:100%;}

    .stats{display:grid; gap:10px; margin-top:14px; grid-template-columns:1fr 1fr;}
    .stat{
      display:grid;
      grid-template-columns: 44px 1fr;
      gap:10px;
      align-items:center;
      padding:12px 12px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(8,12,24,0.45);
      backdrop-filter: blur(10px);
      min-height:78px;
    }
    .icon{
      width:44px;height:44px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      border:1px solid rgba(255,255,255,0.14);
      background: linear-gradient(135deg, rgba(110,231,255,0.18), rgba(167,139,250,0.12));
      color: rgba(255,255,255,0.90);
      font-size:22px;
    }
    .k{font-size:12px; color: rgba(255,255,255,0.62); letter-spacing:0.6px; text-transform:uppercase;}
    .v{margin-top:4px; font-size:24px; font-weight:1000; letter-spacing:-0.6px; line-height:1.02;}
    .v small{font-weight:900; font-size:14px; color: rgba(255,255,255,0.62); margin-left:6px;}

    .chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
    .chip{font-size:12px; padding:7px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.82);
      letter-spacing:0.1px;
    }
    .chip.hot{border-color: rgba(110,231,255,0.35); background: rgba(110,231,255,0.07)}

    .elevBox{margin-top:14px; padding:12px; border-radius:14px; border:1px solid rgba(255,255,255,0.12);
      background: rgba(8,12,24,0.45); backdrop-filter: blur(10px);
    }
    .elevHead{font-size:12px; color: rgba(255,255,255,0.62); letter-spacing:0.6px; text-transform:uppercase; margin-bottom:8px;}
    #elevChart{width:100%; height:120px; display:block;}

    .hiBox{margin-top:14px; padding:12px; border-radius:14px; border:1px solid rgba(255,255,255,0.12);
      background: rgba(8,12,24,0.45); backdrop-filter: blur(10px);
    }
    .hiHead{display:flex; align-items:baseline; justify-content:space-between; gap:10px;}
    .hiTitle{font-size:12px; color: rgba(255,255,255,0.72); letter-spacing:0.6px; text-transform:uppercase;}
    .hiSub{font-size:11px; color: rgba(255,255,255,0.44);}

    .foot{margin-top:14px; color:rgba(255,255,255,0.45); font-size:11px; display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;}
    a{color:inherit}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="frame">
      <div class="card">
        <div class="inner">
          <div class="top">
            <div class="brandName" id="brand">ROAMCORE:</div>
            <h1 class="title" id="title">TRIP WRAPPED</h1>
            <div class="subtitle" id="subtitle">—</div>
          </div>

          <div class="mapBox">
            <img class="mapCanvas" id="mapimg" alt="Trip route map" />
          </div>

          <div class="stats">
            <div class="stat">
              <div class="icon">🚐</div>
              <div>
                <div class="k">Total distance</div>
                <div class="v" id="statDistance">—</div>
              </div>
            </div>
            <div class="stat">
              <div class="icon">🔥</div>
              <div>
                <div class="k">Nights on the road</div>
                <div class="v" id="statNights">—</div>
              </div>
            </div>
            <div class="stat">
              <div class="icon">⛰️</div>
              <div>
                <div class="k">Elevation gain</div>
                <div class="v" id="statElev">—</div>
              </div>
            </div>
            <div class="stat">
              <div class="icon">📍</div>
              <div>
                <div class="k">Places explored</div>
                <div class="v" id="statPlaces">—</div>
              </div>
            </div>
          </div>

          <div class="hiBox" id="hiBox" style="display:none;">
            <div class="hiHead">
              <div class="hiTitle">Highlights</div>
              <div class="hiSub" id="hiSub">—</div>
            </div>
            <div class="chips" id="hiChips"></div>
          </div>

          <div class="elevBox" id="elevBox" style="display:none;">
            <div class="elevHead">Elevation profile</div>
            <canvas id="elevChart"></canvas>
          </div>

          <div class="foot">
            <div id="generated">Generated —</div>
            <div id="device">Device —</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /*__TRIP_WRAPPED_DATA__*/

    const d = window.TRIP_WRAPPED_DATA || {};
    const meta = d.meta || {};
    const stats = d.stats || {};
    const comps = d.comparisons || {};

    const fmtKm = (m) => {
      const km = (Number(m)||0) / 1000;
      return km >= 100 ? km.toFixed(0) : km.toFixed(1);
    };
    const fmtMi = (m) => {
      const mi = (Number(m)||0) / 1609.344;
      return mi >= 100 ? mi.toFixed(0) : mi.toFixed(1);
    };
    const fmtInt = (n) => (Number(n)||0).toLocaleString();
    const fmt1 = (n) => (Number(n)||0).toFixed(1);
    const fmtDays = (d) => {
      d = Number(d)||0;
      if (d === 1) return '1 day';
      return `${fmtInt(d)} days`;
    };
    const fmtHours = (h) => {
      h = Number(h)||0;
      return h >= 10 ? `${h.toFixed(0)}h` : `${h.toFixed(1)}h`;
    };

    const clamp = (x,a,b) => Math.max(a, Math.min(b, x));

    const title = meta.title || 'Your RoamCore Journey';
    const from = meta.from ? new Date(meta.from) : null;
    const to = meta.to ? new Date(meta.to) : null;
    const gen = meta.generatedAt ? new Date(meta.generatedAt) : null;

    document.getElementById('title').textContent = title.toUpperCase();
    document.getElementById('subtitle').textContent = from && to
      ? `${from.toLocaleDateString(undefined)} → ${to.toLocaleDateString(undefined)}`
      : (from ? from.toLocaleString(undefined, { month: 'long', year: 'numeric' }) : '—');
    document.getElementById('generated').textContent = gen ? `Generated ${gen.toLocaleString()}` : 'Generated —';
    document.getElementById('device').textContent = meta.deviceId ? `Device ${meta.deviceId}` : 'Device —';

    const totalM = Number(stats.totalDistanceM || 0);
    const totalDays = Number(stats.totalDays || 0);
    const stops = Number(stats.numberOfStops || 0);

    // Stat tiles
    const unit = (meta.units || '').toString().toLowerCase();
    const useMiles = unit === 'imperial' || unit === 'us' || unit === 'mi' || unit === 'miles';
    const distTxt = useMiles
      ? `${fmtInt(Math.round(Number(totalM)/1609.344))} MILES`
      : `${fmtInt(Math.round(Number(totalM)/1000))} KM`;
    document.getElementById('statDistance').textContent = distTxt;

    const nights = Number(stats.nightsParked || 0) || (Number.isFinite(totalDays) ? Math.max(0, Math.round(totalDays)) : 0);
    document.getElementById('statNights').textContent = nights ? `${fmtInt(nights)} NIGHTS` : '—';

    const elevM = Number(stats.totalElevationGainM || stats.elevationGainM || 0);
    if (elevM > 0) {
      const ft = elevM * 3.28084;
      const elevTxt = useMiles ? `${fmtInt(Math.round(ft))} FT` : `${fmtInt(Math.round(elevM))} M`;
      document.getElementById('statElev').textContent = elevTxt;
    } else {
      document.getElementById('statElev').textContent = '—';
    }

    // Elevation profile chart (best-effort)
    try {
      const prof = stats.elevationProfile && Array.isArray(stats.elevationProfile.points)
        ? stats.elevationProfile
        : null;
      if (prof && prof.points.length >= 2) {
        const pts = prof.points
          .map(p => ({x: Number(p.dKm), y: Number(p.alt)}))
          .filter(p => Number.isFinite(p.x) && Number.isFinite(p.y));
        if (pts.length >= 2) {
          const box = document.getElementById('elevBox');
          const c = document.getElementById('elevChart');
          box.style.display = '';

          const dpr = window.devicePixelRatio || 1;
          const w = Math.max(1, c.clientWidth || 1);
          const h = Math.max(1, c.clientHeight || 120);
          c.width = Math.floor(w * dpr);
          c.height = Math.floor(h * dpr);
          const ctx = c.getContext('2d');
          ctx.scale(dpr, dpr);

          const pad = 8;
          const minX = Math.min(...pts.map(p => p.x));
          const maxX = Math.max(...pts.map(p => p.x));
          const minY = Math.min(...pts.map(p => p.y));
          const maxY = Math.max(...pts.map(p => p.y));
          const dx = Math.max(1e-9, maxX - minX);
          const dy = Math.max(1e-9, maxY - minY);

          const X = (x) => pad + ((x - minX) / dx) * (w - pad * 2);
          const Y = (y) => (h - pad) - ((y - minY) / dy) * (h - pad * 2);

          // Background grid (subtle)
          ctx.clearRect(0, 0, w, h);
          ctx.lineWidth = 1;
          ctx.strokeStyle = 'rgba(255,255,255,0.08)';
          for (let i=1;i<=3;i++) {
            const yy = pad + (i/4)*(h-pad*2);
            ctx.beginPath(); ctx.moveTo(pad, yy); ctx.lineTo(w-pad, yy); ctx.stroke();
          }

          // Area fill
          ctx.beginPath();
          ctx.moveTo(X(pts[0].x), h - pad);
          for (const p of pts) ctx.lineTo(X(p.x), Y(p.y));
          ctx.lineTo(X(pts[pts.length-1].x), h - pad);
          ctx.closePath();
          ctx.fillStyle = 'rgba(110,231,255,0.10)';
          ctx.fill();

          // Line
          ctx.beginPath();
          for (let i=0;i<pts.length;i++) {
            const p = pts[i];
            const xx = X(p.x), yy = Y(p.y);
            if (i===0) ctx.moveTo(xx, yy); else ctx.lineTo(xx, yy);
          }
          ctx.strokeStyle = 'rgba(110,231,255,0.90)';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }
    } catch (e) {}

    document.getElementById('statPlaces').textContent = stops ? `${fmtInt(stops)} PLACES` : '—';

    // Highlights (local history comparisons)
    try {
      const hiBox = document.getElementById('hiBox');
      const hiChips = document.getElementById('hiChips');
      const hiSub = document.getElementById('hiSub');
      const insights = Array.isArray(comps.insights) ? comps.insights : [];
      const histCount = Number(comps.historyCount || 0);
      if (hiBox && hiChips && (insights.length || histCount)) {
        hiBox.style.display = 'block';
        if (hiSub) hiSub.textContent = histCount ? `vs ${histCount} past trips` : 'First trip';
        const add = (txt, hot=false) => {
          const el = document.createElement('div');
          el.className = hot ? 'chip hot' : 'chip';
          el.textContent = txt;
          hiChips.appendChild(el);
        };
        for (const it of insights) {
          if (!it) continue;
          if (typeof it === 'string') {
            const st = it.trim();
            if (st) add(st, st.toLowerCase().includes('record'));
            continue;
          }
          if (typeof it === 'object') {
            const title = String(it.title || it.kind || '').trim();
            if (title) add(title, String(it.kind||'') === 'record');
          }
        }

        // Traveller type (short + story friendly)
        if (comps.travellerType && comps.travellerType.label) {
          add(String(comps.travellerType.label), false);
        }
      }
    } catch(e) {}

    // --- Static map snapshot (non-interactive) ---
    // We render a MapLibre map once (raster OSM w/ labels) then snapshot it to PNG
    // and replace the map with a simple <img> so users cannot pan/zoom.
    const route = Array.isArray(stats.journeyRoute) ? stats.journeyRoute : (Array.isArray(stats.topTripRoute) ? stats.topTripRoute : []);
    const mapimg = document.getElementById('mapimg');
    const mapBox = document.querySelector('.mapBox');

    const loadCss = (href) => new Promise((res, rej) => {
      const l=document.createElement('link'); l.rel='stylesheet'; l.href=href; l.onload=res; l.onerror=rej; document.head.appendChild(l);
    });
    const loadJs = (src) => new Promise((res, rej) => {
      const s=document.createElement('script'); s.src=src; s.defer=true; s.onload=res; s.onerror=rej; document.head.appendChild(s);
    });

    const fitBounds = (m, coords) => {
      let minLat= 90, minLon=180, maxLat=-90, maxLon=-180;
      for (const p of coords){
        const lat=Number(p.lat), lon=Number(p.lon);
        if(!Number.isFinite(lat)||!Number.isFinite(lon)) continue;
        minLat=Math.min(minLat,lat); minLon=Math.min(minLon,lon);
        maxLat=Math.max(maxLat,lat); maxLon=Math.max(maxLon,lon);
      }
      if (minLat>maxLat) return;
      m.fitBounds([[minLon, minLat],[maxLon, maxLat]], {padding: 40, duration: 0});
    };

    const renderStaticSnapshot = async () => {
      // Prefer a pre-rendered static PNG generated at export time.
      if (meta.mapImageUrl) {
        mapimg.src = meta.mapImageUrl;
        mapimg.style.display = 'block';
        return;
      }
      if (!route || route.length < 2) {
        mapimg.style.display = 'none';
        return;
      }

      // Create a temporary div for MapLibre
      const div = document.createElement('div');
      div.style.position='absolute';
      div.style.inset='0';
      mapBox.appendChild(div);

      // Load MapLibre from local HA assets
      const base = '/local/roamcore/vendor/maplibre-gl';
      await loadCss(base + '/maplibre-gl.css');
      await loadJs(base + '/maplibre-gl.js');
      await loadJs('/local/roamcore/vendor/pmtiles/pmtiles.js');

      // PMTiles protocol + RoamCore vector style (better than raster for share cards)
      // @ts-ignore
      const protocol = new pmtiles.Protocol();
      // @ts-ignore
      maplibregl.addProtocol('pmtiles', protocol.tile);

      // Load style JSON from HA and resolve __ORIGIN__ placeholders.
      const styleUrl = '/local/roamcore/styles/rc-offline-protomaps-light.json';
      const style = await (await fetch(styleUrl)).json();
      const origin = window.location.origin;
      const fix = (v) => (typeof v === 'string') ? v.replaceAll('__ORIGIN__', origin) : v;
      try {
        style.glyphs = fix(style.glyphs);
        // sprite is external in this style; OK when internet is available.
        for (const k of Object.keys(style.sources||{})) {
          const s = style.sources[k];
          if (s && s.url) s.url = fix(s.url);
          if (s && s.tiles) s.tiles = (s.tiles||[]).map(fix);
        }
      } catch(e) {}

      // Optional dark mode: ?theme=dark
      const theme = (new URLSearchParams(location.search).get('theme') || '').toLowerCase();
      const wantDark = theme === 'dark';

      // (No hint UI in the minimal template.)

      const parseHex = (hex) => {
        const h = hex.replace('#','').trim();
        if (h.length === 3) {
          const r = parseInt(h[0]+h[0],16), g=parseInt(h[1]+h[1],16), b=parseInt(h[2]+h[2],16);
          return [r,g,b,1];
        }
        if (h.length === 6) {
          const r = parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
          return [r,g,b,1];
        }
        return null;
      };

      const parseRgba = (s) => {
        const m = String(s).match(/rgba?\(([^)]+)\)/i);
        if (!m) return null;
        const parts = m[1].split(',').map(x=>x.trim());
        if (parts.length < 3) return null;
        const r = Number(parts[0]), g = Number(parts[1]), b = Number(parts[2]);
        const a = parts.length>=4 ? Number(parts[3]) : 1;
        if (![r,g,b,a].every(x=>Number.isFinite(x))) return null;
        return [r,g,b,a];
      };

      const toRgbaStr = (c) => `rgba(${Math.round(c[0])},${Math.round(c[1])},${Math.round(c[2])},${Math.max(0,Math.min(1,c[3]??1))})`;

      const darkenColor = (s) => {
        // Heuristic: invert lightness-ish and bias towards deep navy.
        const hex = parseHex(s);
        const rgba = hex || parseRgba(s);
        if (!rgba) return s;
        let [r,g,b,a] = rgba;
        // Convert to luminance and remap
        const lum = (0.2126*r + 0.7152*g + 0.0722*b) / 255;
        const t = 1 - lum;
        // Base dark palette anchor
        const base = [7,10,18];
        // Mix original inverted color with base
        const rr = base[0] + (255 - r) * 0.55 * (0.35 + 0.65*t);
        const gg = base[1] + (255 - g) * 0.55 * (0.35 + 0.65*t);
        const bb = base[2] + (255 - b) * 0.65 * (0.35 + 0.65*t);
        return toRgbaStr([rr,gg,bb,a]);
      };

      const mapPaint = (obj) => {
        if (!obj || typeof obj !== 'object') return;
        for (const k of Object.keys(obj)) {
          const v = obj[k];
          if (typeof v === 'string') {
            if (v.startsWith('#') || v.toLowerCase().startsWith('rgb')) obj[k] = darkenColor(v);
          } else if (Array.isArray(v)) {
            // Expressions can contain colors as string literals.
            obj[k] = v.map(x => (typeof x === 'string' && (x.startsWith('#') || x.toLowerCase().startsWith('rgb'))) ? darkenColor(x) : x);
          } else if (v && typeof v === 'object') {
            mapPaint(v);
          }
        }
      };

      if (wantDark) {
        try {
          style.sprite = 'https://protomaps.github.io/basemaps-assets/sprites/v4/dark';
          // Darken background + most paints (heuristic)
          for (const lyr of (style.layers || [])) {
            if (lyr && lyr.paint) mapPaint(lyr.paint);
            if (lyr && lyr.type === 'background') {
              lyr.paint = lyr.paint || {};
              lyr.paint['background-color'] = 'rgba(7,10,18,1)';
            }
          }
        } catch(e) {}
      }

      // @ts-ignore
      const map = new maplibregl.Map({
        container: div,
        style,
        interactive: false,
        attributionControl: false,
        preserveDrawingBuffer: true,
      });

      map.once('load', () => {
        // Add route layer
        const coords = route.map(p => [Number(p.lon), Number(p.lat)]).filter(x => Number.isFinite(x[0]) && Number.isFinite(x[1]));
        map.addSource('route', {type:'geojson', data:{type:'Feature', geometry:{type:'LineString', coordinates: coords}}});
        map.addLayer({id:'route-glow', type:'line', source:'route', paint:{'line-color':'#6EE7FF','line-width':7,'line-opacity':0.35}});
        map.addLayer({id:'route', type:'line', source:'route', paint:{'line-color':'#E6FDFF','line-width':3,'line-opacity':0.95}});
        // Start/end dots
        const start = coords[0];
        const end = coords[coords.length-1];
        map.addSource('se', {type:'geojson', data:{type:'FeatureCollection', features:[
          {type:'Feature', properties:{c:'#34D399'}, geometry:{type:'Point', coordinates:start}},
          {type:'Feature', properties:{c:'#FBBF24'}, geometry:{type:'Point', coordinates:end}},
        ]}});
        map.addLayer({id:'se', type:'circle', source:'se', paint:{'circle-radius':5,'circle-color':['get','c'],'circle-stroke-color':'#0B1020','circle-stroke-width':2}});
        fitBounds(map, route);
      });

      map.once('idle', () => {
        try {
          const png = map.getCanvas().toDataURL('image/png');
          map.remove();
          div.remove();
          mapimg.src = png;
          mapimg.style.display = 'block';
        } catch (e) {
          try { map.remove(); } catch(e2) {}
          try { div.remove(); } catch(e3) {}
        }
      });
    };

    renderStaticSnapshot();
  </script>
</body>
</html>
