name: "RoamCore Traccar Proxy"
slug: roamcore-traccar-proxy
description: "Ingress-enabled reverse proxy to Traccar for RoamCore iframe embedding (avoids mobile local-network iframe blocking)."
version: "0.1.0"
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:map
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
map:
  - config:rw
options:
  traccar_base_url: "http://homeassistant.local:8082"
schema:
  traccar_base_url: str
