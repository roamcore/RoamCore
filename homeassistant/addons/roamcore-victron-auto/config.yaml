name: RoamCore Victron Auto (DEV)
slug: roamcore_victron_auto_dev
description: "Auto-discovery Victron GX/Venus MQTT \u2192 vt_* entities via MQTT Discovery\
  \ (DEV)"
version: 0.2.7
startup: services
boot: auto
init: false
arch:
- amd64
ingress: true
ingress_port: 8099
ingress_entry: "/"
host_network: true
hassio_api: true
homeassistant_api: true
auth_api: true
map:
- config:rw
options:
  scan_interval_sec: 15
  mqtt_connect_timeout_sec: 10
  victron_mqtt_port: 1883
  victron_mqtt_port_tls: 8883
  victron_use_tls: false
  victron_tls_insecure: true
  keepalive_use_echo: true
  full_snapshot_interval_sec: 0
  startup_read_requests: []
  prefer_mdns: true
  prefer_venus_local: true
  publish_discovery: true
  publish_devices_sensor: true
  devices_sensor_max: 50
  topics_sensor_max: 200
  publish_raw_topics: false
  raw_topics_max: 500
  discovery_prefix: homeassistant
  device_name: RoamCore Victron System
  device_id: roamcore-victron
  log_level: info
schema:
  scan_interval_sec: int(5,300)
  mqtt_connect_timeout_sec: int(3,60)
  # Optional explicit HA MQTT creds (when Supervisor MQTT service is not enabled)
  ha_mqtt_username: str?
  ha_mqtt_password: password?
  victron_host: str?
  victron_mqtt_port: int(1,65535)
  victron_mqtt_port_tls: int(1,65535)
  victron_use_tls: bool
  victron_portal_id: str?
  victron_username: str?
  victron_password: password?
  victron_tls_ca_file: str?
  victron_tls_insecure: bool
  keepalive_use_echo: bool
  full_snapshot_interval_sec: int(0,86400)
  startup_read_requests:
  - str
  prefer_mdns: bool
  prefer_venus_local: bool
  publish_discovery: bool
  publish_devices_sensor: bool
  devices_sensor_max: int(0,500)
  topics_sensor_max: int(0,2000)
  publish_raw_topics: bool
  raw_topics_max: int(0,5000)
  discovery_prefix: str
  device_name: str
  device_id: str
  log_level: list(trace|debug|info|warn|error)
services:
- mqtt:need
